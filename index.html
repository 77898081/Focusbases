// ─── STORAGE HOOK ─────────────────────────────────────────────────────────────
const useLS = (key, init) => {
  const [v, setV] = useState(() => {
    try {
      const s = localStorage.getItem(key);
      return s !== null ? JSON.parse(s) : init;
    } catch { return init; }
  });
  const set = useCallback(fn => {
    setV(prev => {
      const next = typeof fn === "function" ? fn(prev) : fn;
      try { localStorage.setItem(key, JSON.stringify(next)); } catch {}
      return next;
    });
  }, [key]);
  return [v, set];
};

// ─── BASE EFFECTS CALCULATOR ──────────────────────────────────────────────────
function calcBaseEffects(placed) {
  const t = { focusBonus:0, xpMultiplier:0, gameMultiplier:0, habitBonus:0, energyLimit:0, oxygenBonus:0, streakShield:0, xpFlat:0 };
  placed.forEach(p => {
    const st = STRUCTURES.find(x => x.id === p.structId);
    if (!st || !st.effects) return;
    Object.keys(st.effects).forEach(k => { t[k] = (t[k] || 0) + st.effects[k]; });
  });
  return t;
}

function playAudio(type, vol = 100) {
  if (!type || type === "none") return;
  try {
    const audio = new Audio(SOUNDS[type] || SOUNDS.bell);
    audio.volume = Math.max(0, Math.min(1, vol / 100)); // Varsayılan ses %100 yapıldı
    audio.play().catch(e => console.log("Ses çalınamadı:", e));
  } catch (err) {}
}
     
// ─── GAME RESULT SCREEN (top-level component) ─────────────────────────────────
function GameResult({ score, max, color, label, lang, gameMult = 0, xpMult = 0, xpFlatBonus = 0 }) {
  const quotes = lang === "tr" ? QUOTES_TR : QUOTES_EN;
  const q = quotes[Math.floor(Math.random() * quotes.length)];
  const star = score >= max * 0.8 ? "🏆" : score >= max * 0.5 ? "⭐" : "💡";
  const finalPts = Math.floor((20 + score) * (1 + gameMult));
  const finalXP = Math.floor((10 + score / 2) * (1 + xpMult)) + xpFlatBonus;
  return (
    <div style={{ textAlign: "center", padding: "24px 0" }}>
      <div style={{ fontSize: 64, marginBottom: 12 }}>{star}</div>
      <div style={{ ...orb, fontSize: 52, color, marginBottom: 4 }}>{score}</div>
      <div style={{ ...orb, fontSize: 11, color: "rgba(255,255,255,0.5)", letterSpacing: 2, marginBottom: 12 }}>{label}</div>
      <div style={{ ...orb, fontSize: 12, color: "#00ff88", marginTop: 8 }}>+{finalPts}⚡ +{finalXP}XP{gameMult > 0 ? ` (🔬 +${Math.round(gameMult*100)}%)` : ""}</div>
      <div style={{ background: `${color}18`, borderRadius: 8, height: 6, margin: "16px 0", overflow: "hidden" }}>
        <div style={{ height: "100%", width: `${Math.min(100, (score / max) * 100)}%`, background: `linear-gradient(90deg,${color},${color}88)`, borderRadius: 8 }} />
      </div>
      <p style={{ fontSize: 13, color: "rgba(255,255,255,0.55)", fontStyle: "italic", lineHeight: 1.7, marginTop: 16 }}>"{q.text}"</p>
    </div>
  );
}

          {new Date().toLocaleDateString(lang === "tr" ? "tr-TR" : "en-US", { weekday:"long", day:"numeric", month:"long" }).toUpperCase()}

        <h1 style={{ ...orb, fontSize: 22, color: T.text, letterSpacing: 1, marginTop: 4 }}>{greeting} 👋</h1>
      </div>

      {/* Level Card */}
      <div style={{ ...glowCard(T.accent, T, { padding: 18, marginBottom: 14 }) }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
          <div>
            <div style={{ ...orb, fontSize: 10, color: T.textMuted, letterSpacing: 2 }}>{t.rankLabel}</div>
            <div style={{ ...orb, fontSize: 18, color: rankC, marginTop: 3 }}>{t.ranks[Math.min(level, t.ranks.length-1)]}</div>
          </div>
          <div style={{ textAlign: "right" }}>
            <div style={{ ...orb, fontSize: 10, color: T.textMuted, letterSpacing: 2 }}>{t.levelLabel}</div>
            <div style={{ ...orb, fontSize: 30, color: rankC, lineHeight: 1 }}>{level}</div>
          </div>
        </div>
        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
          <span style={{ ...orb, fontSize: 9, color: T.textDim }}>{xp} / {nextXP} XP</span>
          <span style={{ ...orb, fontSize: 9, color: rankC }}>{Math.round(levelProgress*100)}%</span>
        </div>
        <div style={{ background: "rgba(255,255,255,0.06)", borderRadius: 8, height: 8, overflow: "hidden" }}>
          <div style={{ height: "100%", width: `${Math.round(levelProgress*100)}%`, background: `linear-gradient(90deg,${rankC},${rankC}88)`, borderRadius: 8, transition: "width 0.8s ease", boxShadow: `0 0 10px ${rankC}50` }} />
        </div>
        {level < t.ranks.length-1 && <div style={{ ...orb, fontSize:8, color:T.textDim, marginTop:6, textAlign:"center" }}>Sonraki rütbe: <span style={{ color:rankC }}>{nextRank}</span> · {nextXP-xp} XP kaldı</div>}
      </div>

      {/* Mood */}
      <div style={{ ...card(T, { padding: "14px 16px", marginBottom: 14 }) }}>
        <div style={{ ...orb, fontSize: 9, color: T.textDim, letterSpacing: 2, marginBottom: 10 }}>{t.moodQuestion}</div>
        <div style={{ display: "flex", gap: 8 }}>
          {["😴","😐","🙂","😊","🔥"].map((emoji, i) => (
            <button key={i} onClick={() => setMood(i)} style={{
              flex: 1, padding: "10px 2px", borderRadius: 12, border: "none", cursor: "pointer",
              background: mood === i ? `${moodColors[i]}22` : "rgba(255,255,255,0.03)",
              outline: mood === i ? `1px solid ${moodColors[i]}60` : "1px solid transparent",
              transition: "all 0.2s",
            }}>
              <div style={{ fontSize: 22 }}>{emoji}</div>
              <div style={{ ...orb, fontSize: 7, color: T.textDim, marginTop: 4 }}>{t.moodLabels[i]}</div>
            </button>
          ))}
        </div>
      </div>

      {/* Stats Row */}
      <div style={{ display: "flex", gap: 8, marginBottom: 14 }}>
        {[
          { label: t.sessionLabel, value: sessions, icon: "🎯", color: "#00e5ff" },
          { label: t.streakLabel,  value: streak,   icon: "🔥", color: "#ff6b35" },
          { label: t.xpLabel,      value: xp,       icon: "⚡", color: "#ffd700" },
        ].map(item => (
          <div key={item.label} style={{ flex: 1, ...card(T, { padding: "12px 6px", textAlign: "center" }) }}>
            <div style={{ fontSize: 20, marginBottom: 4 }}>{item.icon}</div>
            <div style={{ ...orb, fontSize: 16, color: item.color }}>{item.value}</div>
            <div style={{ ...orb, fontSize: 8, color: T.textDim, letterSpacing: 1, marginTop: 2 }}>{item.label}</div>
          </div>
        ))}
      </div>

      {/* Quick Access */}
      <div style={{ ...orb, fontSize: 9, color: T.textDim, letterSpacing: 2, marginBottom: 10 }}>{t.quickAccess}</div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 16 }}>
        {[
          { icon:"⏱️", label:t.focus,   screen:"focus",   color:"#00e5ff" },
          { icon:"✅", label:t.habits,  screen:"habits",  color:"#00ff88" },
          { icon:"🧠", label:t.mind,    screen:"mind",    color:"#a78bfa" },
          { icon:"🏛️", label:t.base,    screen:"base",    color:"#ffd700" },
        ].map(c => (
          <button key={c.screen} onClick={() => setScreen(c.screen)} style={{
            ...glowCard(c.color, T, { padding: "18px 14px", cursor: "pointer", textAlign: "left", transition: "all 0.2s" })
          }}>
            <div style={{ fontSize: 28, marginBottom: 8 }}>{c.icon}</div>
            <div style={{ ...orb, fontSize: 13, color: c.color, letterSpacing: 1 }}>{c.label}</div>
          </button>
        ))}
      </div>

      {/* Quote */}
      <div style={{ background: "linear-gradient(135deg,rgba(167,139,250,0.1),rgba(124,58,237,0.05))", border: "1px solid rgba(167,139,250,0.2)", borderRadius: 16, padding: 18 }}>
        <div style={{ ...orb, fontSize: 9, color: "rgba(167,139,250,0.6)", letterSpacing: 2, marginBottom: 10 }}>{t.todayQuote}</div>
        <p style={{ fontSize: 14, color: T.text, lineHeight: 1.7, fontStyle: "italic" }}>"{todayQ.text}"</p>
        <p style={{ ...orb, fontSize: 11, color: "rgba(167,139,250,0.8)", marginTop: 8 }}>— {todayQ.author}</p>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════
   BASE SCREEN
   ═══════════════════════════════════════════════════════════════ */
function BaseScreen() {
  const { T, t, lang, points, setPoints, addXP } = useApp();
  const { placedGlobal: placed, setPlacedGlobal: setPlaced, baseEffects } = useApp();
  // (placed/setPlaced now come from global context so all screens see effects)
  const [selStruct, setSelStruct] = useState(null);
  const [placing, setPlacing] = useState(false);
  const [hover, setHover] = useState(null);
  const [infoP, setInfoP] = useState(null);
  const [tab, setTab] = useState("build");
  const [toast, setToast] = useState(null);

  const totalE = placed.reduce((s, p) => {
    const st = STRUCTURES.find(x => x.id === p.structId);
    return s + (st ? st.energy : 0);
  }, 0);

  function isOcc(c, r, excl) {
    return placed.some(p => {
      if (p.id === excl) return false;
      const st = STRUCTURES.find(x => x.id === p.structId);
      if (!st) return false;
      return c >= p.col && c < p.col + st.w && r >= p.row && r < p.row + st.h;
    });
  }

  function canPlace(sid, c, r) {
    const st = STRUCTURES.find(x => x.id === sid);
    if (!st) return false;
    if (c + st.w > GRID_COLS || r + st.h > GRID_ROWS) return false;
    for (let cc = c; cc < c + st.w; cc++)
      for (let rr = r; rr < r + st.h; rr++)
        if (isOcc(cc, rr)) return false;
    return true;
  }

  function handleCell(c, r) {
    if (placing && selStruct) {
      if (canPlace(selStruct, c, r)) {
        const st = STRUCTURES.find(x => x.id === selStruct);
        if (points >= st.cost) {
          setPoints(p => p - st.cost);
          addXP(st.xp);
          setPlaced(prev => [...prev, { id: `${selStruct}_${Date.now()}`, structId: selStruct, col: c, row: r }]);
          setPlacing(false);
          setSelStruct(null);
          setToast(`${st.emoji} ${lang === "tr" ? st.name : st.nameEn} +${st.xp}XP`);
          setTimeout(() => setToast(null), 2500);
        }
      }
    } else {
      const p = placed.find(p => {
        const st = STRUCTURES.find(x => x.id === p.structId);
        return c >= p.col && c < p.col + st.w && r >= p.row && r < p.row + st.h;
      });
      setInfoP(p || null);
    }
  }

  function demolish(pid) {
    const p = placed.find(x => x.id === pid);
    if (!p || p.structId === "hq") return;
    const st = STRUCTURES.find(x => x.id === p.structId);
    setPoints(pt => pt + Math.floor(st.cost * 0.5));
    setPlaced(prev => prev.filter(x => x.id !== pid));
    setInfoP(null);
  }

  const cellPx = Math.floor(Math.min(340, (typeof window !== "undefined" ? window.innerWidth : 390) - 32) / GRID_COLS);

  return (
    <div style={{ padding: "16px 16px 100px" }}>
      {toast && (
        <div style={{ position:"fixed", top:60, left:"50%", transform:"translateX(-50%)", zIndex:999,
          background:"linear-gradient(135deg,#00e5ff,#0070ff)", borderRadius:20, padding:"12px 24px",
          ...orb, fontSize:12, color:"#050a14", fontWeight:700, boxShadow:"0 0 40px rgba(0,229,255,0.5)",
          animation:"slideDown 0.3s ease", whiteSpace:"nowrap" }}>
          {toast}
        </div>
      )}

      {/* Header */}
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14 }}>
        <div>
          <h2 style={{ ...orb, fontSize:16, color:T.accent, letterSpacing:2 }}>{t.baseTitle}</h2>
          <div style={{ ...orb, fontSize:9, color:T.textDim, marginTop:2 }}>
            {new Date().getHours() < 12 ? "☀️ Gündüz" : new Date().getHours() < 18 ? "🌤️ Öğleden Sonra" : "🌙 Gece"}
          </div>
        </div>
        <div style={{ ...glowCard(totalE >= 0 ? "#ffd700" : "#ff6b6b", T, { padding:"6px 14px", display:"flex", alignItems:"center", gap:6 }) }}>
          <span style={{ ...orb, fontSize:14, color:totalE >= 0 ? "#ffd700" : "#ff6b6b" }}>{totalE >= 0 ? "+" : ""}{totalE}⚡</span>
        </div>
      </div>

      {/* Tabs */}
      <div style={{ display:"flex", gap:6, marginBottom:14 }}>
        {[["build", t.build], ["stats", t.stats]].map(([id, label]) => (
          <button key={id} onClick={() => setTab(id)} style={{
            flex:1, padding:"9px 0", borderRadius:10, cursor:"pointer",
            background: tab === id ? `linear-gradient(135deg,${T.accent},${T.accent}88)` : "rgba(255,255,255,0.04)",
            border: tab === id ? "none" : `1px solid ${T.border}`,
            color: tab === id ? "#050a14" : T.textMuted,
            ...orb, fontSize:11, letterSpacing:1,
          }}>{label}</button>
        ))}
      </div>

      {tab === "build" && (
        <>
          {/* Grid */}
          <div style={{
            position:"relative", width:cellPx * GRID_COLS, height:cellPx * GRID_ROWS,
            margin:"0 auto 14px", borderRadius:16, overflow:"hidden",
            background: T.bg === "#050a14" ? "linear-gradient(160deg,#0a1628,#050d1e)" : "linear-gradient(160deg,#dbeafe,#e0f2fe)",
            border:`1px solid ${T.accent}22`,
          }}>
            {/* Grid lines */}
            <svg style={{ position:"absolute", inset:0, width:"100%", height:"100%", opacity:0.12, pointerEvents:"none" }}>
              {Array.from({ length: GRID_COLS + 1 }).map((_, i) => (
                <line key={"v"+i} x1={i*cellPx} y1={0} x2={i*cellPx} y2={cellPx*GRID_ROWS} stroke={T.accent} strokeWidth={0.5} />
              ))}
              {Array.from({ length: GRID_ROWS + 1 }).map((_, i) => (
                <line key={"h"+i} x1={0} y1={i*cellPx} x2={cellPx*GRID_COLS} y2={i*cellPx} stroke={T.accent} strokeWidth={0.5} />
              ))}
            </svg>
            {/* Empty cells */}
            {Array.from({ length: GRID_COLS * GRID_ROWS }).map((_, idx) => {
              const c = idx % GRID_COLS;
              const r = Math.floor(idx / GRID_COLS);
              if (isOcc(c, r)) return null;
              const canP = placing && selStruct && canPlace(selStruct, c, r);
              const isHov = hover && hover.c === c && hover.r === r;
              return (
                <div key={idx}
                  onClick={() => handleCell(c, r)}
                  onMouseEnter={() => setHover({ c, r })}
                  onMouseLeave={() => setHover(null)}
                  style={{
                    position:"absolute", left:c*cellPx, top:r*cellPx, width:cellPx, height:cellPx,
                    cursor: placing ? (canP ? "crosshair" : "not-allowed") : "default",
                    background: placing && isHov && canP ? "rgba(0,229,255,0.18)" : "transparent",
                    transition:"background 0.1s",
                    display:"flex", alignItems:"center", justifyContent:"center",
                  }}>
                  {!placing && <div style={{ width:2, height:2, borderRadius:"50%", background:`${T.accent}28` }} />}
                  {placing && canP && isHov && (
                    <div style={{ fontSize:cellPx * 0.45, opacity:0.55 }}>
                      {STRUCTURES.find(x => x.id === selStruct)?.emoji}
                    </div>
                  )}
                </div>
              );
            })}
            {/* Placed structures */}
            {placed.map(p => {
              const st = STRUCTURES.find(x => x.id === p.structId);
              if (!st) return null;
              const sel = infoP && infoP.id === p.id;
              return (
                <div key={p.id} onClick={() => handleCell(p.col, p.row)} style={{
                  position:"absolute", left:p.col*cellPx, top:p.row*cellPx,
                  width:st.w*cellPx, height:st.h*cellPx,
                  background:`linear-gradient(135deg,${st.color}22,${st.color}08)`,
                  border:`${sel ? 2 : 1}px solid ${sel ? st.color : st.color + "55"}`,
                  borderRadius:8, cursor:"pointer",
                  display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center",
                  boxShadow: sel ? `0 0 22px ${st.color}55` : `0 0 8px ${st.color}18`,
                  transition:"all 0.2s", zIndex: sel ? 2 : 1,
                }}>
                  <span style={{ fontSize:Math.min(st.w, st.h)*cellPx*0.42, filter:`drop-shadow(0 0 5px ${st.color})` }}>{st.emoji}</span>
                  {st.w >= 2 && (
                    <span style={{ ...orb, fontSize:6.5, color:st.color, marginTop:2, textAlign:"center", padding:"0 3px", letterSpacing:0.3 }}>
                      {(lang === "tr" ? st.name : st.nameEn).slice(0, 14)}
                    </span>
                  )}
                </div>
              );
            })}
          </div>

          {/* Info Panel */}
          {infoP && (() => {
            const st = STRUCTURES.find(x => x.id === infoP.structId);
            return (
              <div style={{ ...glowCard(st.color, T, { padding:16, marginBottom:12 }) }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
                  <div style={{ display:"flex", gap:10, alignItems:"center" }}>
                    <span style={{ fontSize:30 }}>{st.emoji}</span>
                    <div>
                      <div style={{ ...orb, fontSize:12, color:st.color }}>{lang === "tr" ? st.name : st.nameEn}</div>
                      {st.effectDesc && <div style={{ fontSize:10, color:T.accent, marginTop:4, opacity:0.8 }}>✦ {lang === "tr" ? st.effectDesc : st.effectDescEn}</div>}
                    </div>
                  </div>
                  <button onClick={() => setInfoP(null)} style={{ background:"none", border:"none", color:T.textDim, fontSize:20, cursor:"pointer" }}>×</button>
                </div>
                <div style={{ display:"flex", gap:8, marginTop:12 }}>
                  <div style={{ flex:1, ...card(T, { padding:"8px", textAlign:"center" }) }}>
                    <div style={{ ...orb, fontSize:9, color:T.textDim }}>{t.energyLabel}</div>
                    <div style={{ ...orb, fontSize:15, color:st.energy >= 0 ? "#00ff88" : "#ff6b6b", marginTop:2 }}>
                      {st.energy >= 0 ? "+" : ""}{st.energy}
                    </div>
                  </div>
                  <div style={{ flex:1, ...card(T, { padding:"8px", textAlign:"center" }) }}>
                    <div style={{ ...orb, fontSize:9, color:T.textDim }}>{t.sizeLabel}</div>
                    <div style={{ ...orb, fontSize:15, color:T.text, marginTop:2 }}>{st.w}×{st.h}</div>
                  </div>
                  {infoP.structId !== "hq" && (
                    <button onClick={() => demolish(infoP.id)} style={{
                      ...card(T, { padding:"8px 12px", cursor:"pointer", border:"1px solid rgba(255,80,80,0.3)",
                        background:"rgba(255,50,50,0.08)", color:"rgba(255,100,100,0.7)", ...orb, fontSize:9 })
                    }}>🗑️ {t.demolishLabel}<br/>+{Math.floor(st.cost*0.5)}⚡</button>
                  )}
                </div>
              </div>
            );
          })()}

          {/* Shop / Placing mode */}
          {placing ? (
            <div style={{ ...glowCard("#ff6b35", T, { padding:14, display:"flex", justifyContent:"space-between", alignItems:"center" }) }}>
              <span style={{ ...orb, fontSize:11, color:"#ff6b35", letterSpacing:1 }}>📍 {t.placingHint}</span>
              <button onClick={() => { setPlacing(false); setSelStruct(null); }} style={{
                background:"rgba(255,50,50,0.15)", border:"1px solid rgba(255,50,50,0.3)", borderRadius:8,
                padding:"6px 12px", color:"rgba(255,100,100,0.8)", cursor:"pointer", ...orb, fontSize:9,
              }}>{t.cancelPlacing}</button>
            </div>
          ) : (
            <div>
              <div style={{ ...orb, fontSize:9, color:T.textDim, letterSpacing:2, marginBottom:10 }}>{t.shopTitle}</div>
              {STRUCTURES.filter(s => s.id !== "hq").map(st => {
                const aff = points >= st.cost;
                const cnt = placed.filter(p => p.structId === st.id).length;
                return (
                  <div key={st.id} style={{ ...card(T, { padding:"12px 14px", display:"flex", alignItems:"center", gap:12, marginBottom:8, opacity:aff ? 1 : 0.5 }) }}>
                    <span style={{ fontSize:26, filter:`drop-shadow(0 0 5px ${st.color}80)` }}>{st.emoji}</span>
                    <div style={{ flex:1 }}>
                      <div style={{ display:"flex", justifyContent:"space-between" }}>
                        <span style={{ ...orb, fontSize:11, color:st.color }}>{lang === "tr" ? st.name : st.nameEn}</span>
                        <span style={{ ...orb, fontSize:9, color:T.textDim }}>×{cnt}</span>
                      </div>
                      <div style={{ ...orb, fontSize:9, color:st.energy >= 0 ? "#00ff88" : "#ff6b6b", marginTop:4 }}>
                        {st.energy >= 0 ? "+" : ""}{st.energy}⚡ · +{st.xp}XP
                      </div>
                      {st.effectDesc && (
                        <div style={{ fontSize:9, color:T.accent, marginTop:3, opacity:0.75, lineHeight:1.4 }}>
                          ✦ {lang === "tr" ? st.effectDesc : st.effectDescEn}
                        </div>
                      )}
                    </div>
                    <button disabled={!aff} onClick={() => { setSelStruct(st.id); setPlacing(true); setInfoP(null); }} style={{
                      ...btn(aff ? st.color : "#555", { padding:"9px 12px", fontSize:10, borderRadius:10, opacity:aff ? 1 : 0.5, cursor:aff ? "pointer" : "not-allowed" })
                    }}>⚡{st.cost}</button>
                  </div>
                );
              })}
            </div>
          )}
        </>
      )}

      {tab === "stats" && (
        <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
          {[
            { label:t.totalBuildings, value:placed.length, icon:"🏗️", color:"#00e5ff" },
            { label:t.netEnergy, value:`${totalE >= 0 ? "+" : ""}${totalE}`, icon:"⚡", color:totalE >= 0 ? "#ffd700" : "#ff6b6b" },
            { label:t.landUsage, value:`%${Math.round((placed.reduce((a, p) => { const st = STRUCTURES.find(x => x.id === p.structId); return a + st.w * st.h; }, 0) / (GRID_COLS * GRID_ROWS)) * 100)}`, icon:"🗺️", color:"#00ff88" },
          ].map(item => (
            <div key={item.label} style={{ ...glowCard(item.color, T, { padding:"16px 18px", display:"flex", justifyContent:"space-between", alignItems:"center" }) }}>
              <div style={{ display:"flex", gap:10, alignItems:"center" }}>
                <span style={{ fontSize:26 }}>{item.icon}</span>
                <span style={{ ...orb, fontSize:12, color:T.textMuted, letterSpacing:1 }}>{item.label}</span>
              </div>
              <span style={{ ...orb, fontSize:24, color:item.color }}>{item.value}</span>
            </div>
          ))}
          <div style={{ ...card(T, { padding:16, marginBottom:10 }) }}>
            <div style={{ ...orb, fontSize:9, color:T.textDim, letterSpacing:2, marginBottom:12 }}>{t.inventory}</div>
            {STRUCTURES.map(st => {
              const cnt = placed.filter(p => p.structId === st.id).length;
              if (!cnt) return null;
              return (
                <div key={st.id} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"8px 0", borderBottom:`1px solid ${T.border}` }}>
                  <div style={{ display:"flex", gap:8, alignItems:"center" }}>
                    <span style={{ fontSize:18 }}>{st.emoji}</span>
                    <span style={{ fontSize:12, color:st.color }}>{lang === "tr" ? st.name : st.nameEn}</span>
                  </div>
                  <span style={{ ...orb, fontSize:12, color:T.textMuted }}>×{cnt}</span>
                </div>
              );
            })}
          </div>
          {/* Active Effects Summary */}
          <div style={{ background:"rgba(0,229,255,0.06)", border:"1px solid rgba(0,229,255,0.2)", borderRadius:16, padding:16 }}>
            <div style={{ ...orb, fontSize:9, color:"#00e5ff", letterSpacing:2, marginBottom:12 }}>⚡ AKTİF EFEKTLER</div>
            {[
              baseEffects.focusBonus > 0    && { icon:"⏱️", label:"Seans Bonusu",    value:`+${baseEffects.focusBonus}⚡/seans`,    color:"#00e5ff" },
              baseEffects.xpMultiplier > 0  && { icon:"🧬", label:"XP Çarpanı",     value:`+${Math.round(baseEffects.xpMultiplier*100)}%`,        color:"#7c3aed" },
              baseEffects.gameMultiplier > 0&& { icon:"🔬", label:"Oyun Ödülü",     value:`+${Math.round(baseEffects.gameMultiplier*100)}%`,       color:"#f59e0b" },
              baseEffects.habitBonus > 0    && { icon:"✅", label:"Alışkanlık Bon.", value:`+${baseEffects.habitBonus}⚡/alışkanlık`, color:"#00ff88" },
              baseEffects.xpFlat > 0        && { icon:"⭐", label:"Sabit XP",       value:`+${baseEffects.xpFlat}XP/seans`,          color:"#ffd700" },
              baseEffects.oxygenBonus > 0   && { icon:"🌳", label:"Oksijen",        value:`+${baseEffects.oxygenBonus}`,               color:"#22c55e" },
              baseEffects.streakShield > 0  && { icon:"📡", label:"Streak Kalkanı", value:`${baseEffects.streakShield} gün`,           color:"#00ff88" },
              baseEffects.energyLimit > 0   && { icon:"☀️", label:"Enerji Limiti",  value:`+${baseEffects.energyLimit}`,               color:"#ffd700" },
            ].filter(Boolean).map(item => (
              <div key={item.label} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"7px 0", borderBottom:`1px solid rgba(255,255,255,0.05)` }}>
                <div style={{ display:"flex", gap:8, alignItems:"center" }}>
                  <span style={{ fontSize:16 }}>{item.icon}</span>
                  <span style={{ fontSize:11, color:T.textMuted }}>{item.label}</span>
                </div>
                <span style={{ ...orb, fontSize:11, color:item.color, fontWeight:700 }}>{item.value}</span>
              </div>
            ))}
            {Object.values(baseEffects).every(v => v === 0) && (
              <p style={{ fontSize:11, color:T.textDim, textAlign:"center", padding:"8px 0" }}>Henüz aktif efekt yok. Yapı inşa et!</p>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════
   FOCUS SCREEN  —  Sade Pomodoro, aktivite bazlı
   ═══════════════════════════════════════════════════════════════ */

const ACTIVITIES = [
  { id:"study",    label:"Ders",         labelEn:"Study",     icon:"📚", color:"#00e5ff" },
  { id:"work",     label:"İş / Proje",   labelEn:"Work",      icon:"💼", color:"#7c3aed" },
  { id:"reading",  label:"Okuma",        labelEn:"Reading",   icon:"📖", color:"#f59e0b" },
  { id:"coding",   label:"Kod",          labelEn:"Coding",    icon:"💻", color:"#00ff88" },
  { id:"writing",  label:"Yazı",         labelEn:"Writing",   icon:"✍️", color:"#ec4899" },
  { id:"language", label:"Dil",          labelEn:"Language",  icon:"🌍", color:"#38bdf8" },
  { id:"research", label:"Araştırma",    labelEn:"Research",  icon:"🔬", color:"#ff6b35" },
  { id:"creative", label:"Yaratıcı",     labelEn:"Creative",  icon:"🎨", color:"#a78bfa" },
  { id:"exercise", label:"Egzersiz",     labelEn:"Exercise",  icon:"🏃", color:"#22c55e" },
  { id:"planning", label:"Planlama",     labelEn:"Planning",  icon:"🗓️", color:"#ffd700" },
  { id:"other",    label:"Diğer",        labelEn:"Other",     icon:"⚡", color:"#94a3b8" },
];

// Preset modlar — süre + mola bilgisi
const FOCUS_PRESETS = [
  { id:"sprint",   label:"Kısa Sprint",  work:15, brk:3,  icon:"⚡", color:"#00e5ff",  desc:"Hızlı & yoğun" },
  { id:"pomodoro", label:"Pomodoro",     work:25, brk:5,  icon:"🍅", color:"#ff4444",  desc:"Klasik 25/5" },
  { id:"deep",     label:"Derin Odak",   work:50, brk:10, icon:"🔥", color:"#ff6b35",  desc:"Kesintisiz" },
  { id:"marathon", label:"Maraton",      work:90, brk:20, icon:"🏃", color:"#22c55e",  desc:"Uzun soluklu" },
  { id:"custom",   label:"Özel",         work:0,  brk:0,  icon:"⚙️", color:"#a78bfa",  desc:"Sen ayarla" },
];

function FocusScreen() {
  const { T, t, lang, addPoints, addXP, baseEffects, settings } = useApp();
  const bfx = baseEffects || {};

  const [workMin, setWorkMin]     = useLS("fb_workMin", 25);
  const [breakMin, setBreakMin]   = useLS("fb_breakMin", 5);
  const [sessions, setSessions]   = useLS("fb_sessions", 0);
  const [totalFocus, setTotalFocus] = useLS("fb_totalFocus", 0);
  const [history, setHistory]     = useLS("fb_history", []);
  const [combo, setCombo]         = useLS("fb_combo", 0);
  const [savedActivity, setSavedActivity] = useLS("fb_lastActivity", "study");
  const [savedTopic, setSavedTopic]       = useLS("fb_lastTopic", "");
  const [activityStats, setActivityStats] = useLS("fb_activity_stats", {});

  // Phase: idle | setup | quote | work | break | done
  const [phase, setPhase] = useState("idle");
  const [secs, setSecs]   = useState(workMin * 60);

  // Setup (editable before start)
  const [selActivity, setSelActivity] = useState(savedActivity || "study");
  const [topicInput, setTopicInput]   = useState(savedTopic || "");
  const [selPreset, setSelPreset]     = useState("pomodoro");
  const [customWork, setCustomWork]   = useState(String(workMin));
  const [customBreak, setCustomBreak] = useState(String(breakMin));
  const [difficulty, setDifficulty]   = useState(2);

  // Locked-in session values (don't change mid-session)
  const [activeActivity, setActiveActivity] = useState(savedActivity || "study");
  const [activeTopic, setActiveTopic]       = useState(savedTopic || "");
  const [activeWork, setActiveWork]         = useState(workMin);
  const [activeBreak, setActiveBreak]       = useState(breakMin);

  // Breathing
  const [showBreath, setShowBreath]   = useState(false);
  const [breathPhase, setBreathPhase] = useState(0);
  const [breathSecs, setBreathSecs]   = useState(4);
  const [breathCount, setBreathCount] = useState(0);

  const [tab, setTab]   = useState("timer"); // timer | history
  const [qIdx]          = useState(() => Math.floor(Math.random() * QUOTES_TR.length));
  const iRef = useRef(null);
  const bRef = useRef(null);
  const quotes = lang === "tr" ? QUOTES_TR : QUOTES_EN;

  const CIRC      = 2 * Math.PI * 110;
  const totalSecs = phase === "break" ? activeBreak * 60 : activeWork * 60;
  const progress  = totalSecs > 0 ? (totalSecs - secs) / totalSecs : 0;
  const mm = String(Math.floor(secs / 60)).padStart(2, "0");
  const ss = String(secs % 60).padStart(2, "0");
  const ringColor = phase === "break" ? "#00ff88" : phase === "done" ? "#ffd700" : T.accent;

  const actObj       = ACTIVITIES.find(a => a.id === selActivity)    || ACTIVITIES[0];
  const activeActObj = ACTIVITIES.find(a => a.id === activeActivity) || ACTIVITIES[0];

  const todaySessions = history.filter(h => h.date === new Date().toDateString());
  const todayMins     = todaySessions.reduce((s, h) => s + (h.min || 0), 0);

  // ── Timer ────────────────────────────────────────────────────
  useEffect(() => {
    if (phase !== "work" && phase !== "break") return;
    iRef.current = setInterval(() => {
      setSecs(s => {
        if (s > 1) return s - 1;
        clearInterval(iRef.current);
        if (phase === "work") {
          const basePts    = activeWork >= 45 ? 40 : activeWork >= 25 ? 25 : 12;
          const diffMult  = difficulty === 3 ? 1.5 : difficulty === 2 ? 1.2 : 1.0;
          const pts       = Math.floor((basePts + (bfx.focusBonus || 0)) * diffMult);
          const xpEarned  = Math.floor((pts / 2) * (1 + (bfx.xpMultiplier || 0))) + (bfx.xpFlat || 0);
          addPoints(pts); addXP(xpEarned);
          setSessions(n => n + 1);
          setTotalFocus(tf => tf + activeWork);
          setCombo(c => c + 1);
          const now = new Date().toLocaleTimeString(lang === "tr" ? "tr-TR" : "en-US", { hour:"2-digit", minute:"2-digit" });
          setHistory(h => [{ min:activeWork, at:now, date:new Date().toDateString(), activity:activeActivity, topic:activeTopic, difficulty, pts, xp:xpEarned }, ...h.slice(0, 49)]);
          setActivityStats(prev => { const c = prev[activeActivity] || { mins:0, count:0 }; return { ...prev, [activeActivity]:{ mins:c.mins+activeWork, count:c.count+1 } }; });
          setPhase("done");
            if (settings?.sound !== false && settings?.doneSound !== false) {
  playAudio(settings?.soundType || "bell", settings?.volume || 80);
}
                
        } else {
          setPhase("idle"); setSecs(activeWork * 60);
            if (settings?.sound !== false) {
  playAudio("ping", settings?.volume || 80);
}
        }
        return 0;
      });
    }, 1000);
    return () => clearInterval(iRef.current);
  }, [phase, activeWork, activeBreak, settings]);

  // ── Breathing ─────────────────────────────────────────────────
  useEffect(() => {
    if (!showBreath) { clearInterval(bRef.current); return; }
    bRef.current = setInterval(() => {
      setBreathSecs(s => {
        if (s > 1) return s - 1;
        setBreathPhase(p => { const n = (p + 1) % 3; if (p === 2) setBreathCount(c => c + 1); return n; });
        return 4;
      });
    }, 1000);
    return () => clearInterval(bRef.current);
  }, [showBreath]);

  // ── Actions ───────────────────────────────────────────────────
  function pickPreset(pid) {
    setSelPreset(pid);
    const p = FOCUS_PRESETS.find(x => x.id === pid);
    if (p && p.work > 0) { setCustomWork(String(p.work)); setCustomBreak(String(p.brk)); setWorkMin(p.work); setBreakMin(p.brk); }
  }
  function commitSetup() {
    const w = Math.max(1, Math.min(180, parseInt(customWork) || 25));
    const b = Math.max(1, Math.min(60,  parseInt(customBreak) || 5));
    setWorkMin(w); setBreakMin(b); setCustomWork(String(w)); setCustomBreak(String(b));
    setSavedActivity(selActivity); setSavedTopic(topicInput);
    setPhase("idle");
  }
  function launch() {
    setActiveActivity(selActivity); setActiveTopic(topicInput);
    setActiveWork(workMin); setActiveBreak(breakMin);
    setSecs(workMin * 60); setPhase("quote");
  }
  function doBreak()  { setSecs(activeBreak * 60); setPhase("break"); }
  function doReset()  { clearInterval(iRef.current); setPhase("idle"); setSecs(workMin * 60); }
  const breathColors = ["#00e5ff","#ffd700","#a78bfa"];
  const breathLabels = [t.breatheIn, t.breatheHold, t.breatheOut];

  // ═════════════════════════════════════════════════════════════
  return (
    <div style={{ padding:"16px 16px 100px" }}>

      {/* ── Top bar ─────────────────────────────────────────── */}
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
        <div>
          <h2 style={{ ...orb, fontSize:14, color:T.textMuted, letterSpacing:3 }}>
            {phase==="break" ? "🌿 MOLA" : phase==="work" ? `${activeActObj.icon} ODAK` : "ODAK SEANSI"}
          </h2>
          {(phase==="work"||phase==="done") && activeTopic && (
            <p style={{ fontSize:11, color:activeActObj.color, marginTop:3 }}>📌 {activeTopic}</p>
          )}
        </div>
        <div style={{ display:"flex", gap:7 }}>
          <button onClick={()=>setShowBreath(!showBreath)} style={{ background:showBreath?"rgba(124,58,237,0.25)":"rgba(124,58,237,0.1)", border:"1px solid rgba(124,58,237,0.3)", borderRadius:10, padding:"7px 11px", color:"#a78bfa", cursor:"pointer", ...orb, fontSize:10 }}>🫁</button>
          <button onClick={()=>setTab(v=>v==="history"?"timer":"history")} style={{ background:tab==="history"?`${T.accent}20`:T.surface, border:`1px solid ${tab==="history"?T.accent:T.border}`, borderRadius:10, padding:"7px 11px", color:tab==="history"?T.accent:T.textMuted, cursor:"pointer", ...orb, fontSize:10 }}>📋</button>
        </div>
      </div>

      {/* ── Breathing overlay ───────────────────────────────── */}
      {showBreath && (
        <div style={{ background:`${breathColors[breathPhase]}12`, border:`1px solid ${breathColors[breathPhase]}30`, borderRadius:18, padding:20, marginBottom:14, textAlign:"center" }}>
          <div style={{ ...orb, fontSize:9, color:T.textDim, letterSpacing:2, marginBottom:8 }}>NEFES EGZERSİZİ · {breathCount} döngü</div>
          <div style={{ width:80, height:80, borderRadius:"50%", margin:"0 auto 12px", background:`radial-gradient(circle,${breathColors[breathPhase]}25,transparent)`, border:`2px solid ${breathColors[breathPhase]}`, display:"flex", alignItems:"center", justifyContent:"center", boxShadow:`0 0 24px ${breathColors[breathPhase]}40` }}>
            <div style={{ ...orb, fontSize:20, color:breathColors[breathPhase] }}>{breathSecs}</div>
          </div>
          <div style={{ ...orb, fontSize:12, color:breathColors[breathPhase], letterSpacing:2, marginBottom:8 }}>{breathLabels[breathPhase]}</div>
          <button onClick={()=>{setShowBreath(false);setBreathPhase(0);setBreathSecs(4);}} style={{ background:"rgba(255,255,255,0.05)", border:`1px solid ${T.border}`, borderRadius:8, padding:"6px 16px", color:T.textMuted, cursor:"pointer", ...orb, fontSize:9 }}>Kapat</button>
        </div>
      )}

      {/* ══════════════════════════ TIMER TAB ══════════════════ */}
      {tab==="timer" && (
        <>
          {/* ── IDLE: Setup (2 adım) → Başlat ─────────────── */}
          {phase==="idle" && (
            <>
              {/* STEP 1 — Aktivite + Konu */}
              <div style={{ ...glowCard(actObj.color, T, { padding:18, marginBottom:12 }) }}>
                <div style={{ ...orb, fontSize:9, color:actObj.color, letterSpacing:2, marginBottom:12 }}>1 · AKTİVİTE & KONU</div>
                {/* Activity grid */}
                <div style={{ display:"flex", flexWrap:"wrap", gap:6, marginBottom:12 }}>
                  {ACTIVITIES.map(a => (
                    <button key={a.id} onClick={()=>setSelActivity(a.id)} style={{
                      padding:"6px 10px", borderRadius:10, cursor:"pointer", display:"flex", alignItems:"center", gap:5,
                      background: selActivity===a.id ? `${a.color}25` : "rgba(255,255,255,0.04)",
                      border: selActivity===a.id ? `1px solid ${a.color}` : `1px solid ${T.border}`,
                      transition:"all 0.15s",
                    }}>
                      <span style={{ fontSize:14 }}>{a.icon}</span>
                      <span style={{ ...orb, fontSize:8, color:selActivity===a.id?a.color:T.textMuted, letterSpacing:0.3 }}>
                        {lang==="tr"?a.label:a.labelEn}
                      </span>
                    </button>
                  ))}
                </div>
                {/* Topic input */}
                <input
                  placeholder="Konu / Başlık — opsiyonel (örn: Matematik Türev)"
                  value={topicInput}
                  onChange={e=>setTopicInput(e.target.value)}
                  style={{ width:"100%", background:T.inputBg, border:`1px solid ${T.inputBorder}`, borderRadius:10, padding:"10px 13px", color:T.text, fontSize:12, outline:"none" }}
                />
              </div>

              {/* STEP 2 — Süre & Mod */}
              <div style={{ ...card(T, { padding:18, marginBottom:14 }) }}>
                <div style={{ ...orb, fontSize:9, color:T.textDim, letterSpacing:2, marginBottom:12 }}>2 · SÜRE & MOD</div>
                {/* Preset row */}
                <div style={{ display:"flex", gap:7, marginBottom:14 }}>
                  {FOCUS_PRESETS.map(p => (
                    <button key={p.id} onClick={()=>pickPreset(p.id)} style={{
                      flex:1, padding:"10px 4px", borderRadius:12, cursor:"pointer", textAlign:"center",
                      background: selPreset===p.id ? `${p.color}20` : "rgba(255,255,255,0.03)",
                      border: selPreset===p.id ? `1px solid ${p.color}` : `1px solid ${T.border}`,
                      transition:"all 0.15s",
                    }}>
                      <div style={{ fontSize:18, marginBottom:4 }}>{p.icon}</div>
                      <div style={{ ...orb, fontSize:8, color:selPreset===p.id?p.color:T.textMuted, lineHeight:1.3 }}>{p.label}</div>
                      {p.work>0 && <div style={{ ...orb, fontSize:7, color:T.textDim, marginTop:2 }}>{p.work}/{p.brk}</div>}
                    </button>
                  ))}
                </div>
                {/* Duration inputs — always visible, compact */}
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:14 }}>
                  {[["⏱ Odak (dk)", customWork, setCustomWork, setWorkMin], ["☕ Mola (dk)", customBreak, setCustomBreak, setBreakMin]].map(([label,val,setter,persist]) => (
                    <div key={label}>
                      <div style={{ ...orb, fontSize:9, color:T.textDim, marginBottom:5 }}>{label}</div>
                      <input type="number" value={val}
                        onChange={e=>{ setter(e.target.value); setSelPreset("custom"); }}
                        onBlur={e=>{ const n=Math.max(1,parseInt(e.target.value)||25); setter(String(n)); persist(n); }}
                        style={{ width:"100%", background:T.inputBg, border:`1px solid ${T.inputBorder}`, borderRadius:10, padding:"9px", color:T.text, fontSize:22, ...orb, textAlign:"center", outline:"none" }} />
                    </div>
                  ))}
                </div>
                {/* Difficulty */}
                <div style={{ ...orb, fontSize:9, color:T.textDim, letterSpacing:2, marginBottom:10 }}>ZORLUK SEVİYESİ</div>
                <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                  {[
                    { d:1, label:"Kolay",  color:"#00ff88", icon:"🟢",
                      perks:["Daha kısa odak süreleri (15-25dk)","Mola süren daha uzun tutulur","Standart puan: ⚡ x1","Alışkanlık baskısı yok","Yeni başlayanlar için ideal"],
                      bonus:null, xpMult:"x1" },
                    { d:2, label:"Orta",   color:"#ffd700", icon:"🟡",
                      perks:["Orta süre seanslar (25-50dk)","Standart mola süreleri","Puan: ⚡ x1.2 bonus","Günlük görevler daha kolay tamamlanır","Çoğu kullanıcı için önerilen"],
                      bonus:"+%20 puan", xpMult:"x1.2" },
                    { d:3, label:"Zor",    color:"#ff6b35", icon:"🔴",
                      perks:["Uzun ve derin seanslar (45-90dk)","Minimum mola süreleri","Puan: ⚡ x1.5 bonus","Özel görev: Haftalık Derin Odak Ustası","Streak bonusu x2 kazanırsın"],
                      bonus:"+%50 puan", xpMult:"x1.5" },
                  ].map(({d,label,color,icon,perks,bonus,xpMult}) => {
                    const sel = difficulty===d;
                    return (
                      <button key={d} onClick={()=>setDifficulty(d)} style={{
                        padding:"12px 14px", borderRadius:14, cursor:"pointer", textAlign:"left",
                        background: sel?`${color}15`:"rgba(255,255,255,0.03)",
                        border: sel?`1px solid ${color}`:`1px solid ${T.border}`,
                        transition:"all 0.2s",
                      }}>
                        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom: sel?10:0 }}>
                          <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                            <span style={{ fontSize:16 }}>{icon}</span>
                            <span style={{ ...orb, fontSize:11, color:sel?color:T.textMuted, letterSpacing:1 }}>
                              {"●".repeat(d)+"○".repeat(3-d)}  {label}
                            </span>
                          </div>
                          <div style={{ display:"flex", gap:6, alignItems:"center" }}>
                            {bonus && sel && <span style={{ ...orb, fontSize:9, color, background:`${color}20`, padding:"2px 8px", borderRadius:6 }}>{bonus}</span>}
                            <span style={{ ...orb, fontSize:9, color:sel?color:T.textDim }}>XP {xpMult}</span>
                            <span style={{ ...orb, fontSize:12, color:sel?color:T.textDim }}>{sel?"▲":"▸"}</span>
                          </div>
                        </div>
                        {sel && (
                          <div style={{ display:"flex", flexDirection:"column", gap:4, paddingLeft:24 }}>
                            {perks.map((p,i) => (
                              <div key={i} style={{ display:"flex", gap:6, alignItems:"flex-start" }}>
                                <span style={{ color, fontSize:9, marginTop:1, flexShrink:0 }}>✦</span>
                                <span style={{ fontSize:10, color:T.textMuted, lineHeight:1.4 }}>{p}</span>
                              </div>
                            ))}
                          </div>
                        )}
                      </button>
                    );
                  })}
                </div>
              </div>

              {/* Bonus hint */}
              {bfx.focusBonus>0 && (
                <div style={{ background:"rgba(0,229,255,0.07)", border:"1px solid rgba(0,229,255,0.18)", borderRadius:10, padding:"8px 13px", marginBottom:14, display:"flex", alignItems:"center", gap:8 }}>
                  <span style={{ fontSize:14 }}>🏛️</span>
                  <span style={{ fontSize:11, color:T.accent }}>Üs bonusu: <strong>+{bfx.focusBonus}⚡</strong> bu seans eklenecek</span>
                </div>
              )}

              {/* Today mini stats */}
              <div style={{ display:"flex", gap:8, marginBottom:16 }}>
                {[[String(todaySessions.length),"BUGÜN SEANS","🎯"],[String(todayMins)+"dk","BUGÜN SÜRE","⏱"],[String(combo)+"×","KOMBO","🔥"]].map(([v,l,ic])=>(
                  <div key={l} style={{ flex:1, ...card(T,{padding:"10px 6px",textAlign:"center"}) }}>
                    <div style={{ fontSize:16, marginBottom:4 }}>{ic}</div>
                    <div style={{ ...orb, fontSize:13, color:T.text }}>{v}</div>
                    <div style={{ ...orb, fontSize:7, color:T.textDim, marginTop:2 }}>{l}</div>
                  </div>
                ))}
              </div>

              {/* START button */}
              <button onClick={launch} style={{ ...btn(actObj.color,{width:"100%",padding:"18px",fontSize:16,letterSpacing:4,borderRadius:16}) }}>
                BAŞLAT
              </button>
            </>
          )}

          {/* ── QUOTE (seans hazırlık) ─────────────────────── */}
          {phase==="quote" && (
            <div style={{ background:"rgba(167,139,250,0.1)", border:"1px solid rgba(167,139,250,0.25)", borderRadius:20, padding:28, textAlign:"center", animation:"fadeIn 0.5s ease" }}>
              <div style={{ fontSize:32, marginBottom:8 }}>{activeActObj.icon}</div>
              <div style={{ ...orb, fontSize:11, color:activeActObj.color, letterSpacing:2, marginBottom:4 }}>
                {lang==="tr"?activeActObj.label:activeActObj.labelEn}
                {activeTopic && <span style={{ color:T.textMuted }}> · {activeTopic}</span>}
              </div>
              <div style={{ ...orb, fontSize:9, color:T.textDim, marginBottom:20 }}>⏱ {activeWork}dk · ☕ {activeBreak}dk · {["Kolay","Orta","Zor"][difficulty-1]}</div>
              <p style={{ fontSize:15, color:T.text, lineHeight:1.7, fontStyle:"italic", marginBottom:10 }}>"{quotes[qIdx].text}"</p>
              <p style={{ ...orb, fontSize:11, color:"#a78bfa", letterSpacing:1, marginBottom:22 }}>— {quotes[qIdx].author}</p>
              <button onClick={()=>{setPhase("work");setSecs(activeWork*60);}} style={{ background:"linear-gradient(135deg,#a78bfa,#7c3aed)", border:"none", borderRadius:14, padding:"14px 44px", color:"white", ...orb, fontSize:13, fontWeight:700, letterSpacing:2, cursor:"pointer", boxShadow:"0 0 30px rgba(167,139,250,0.4)" }}>
                ZİHNİM HAZIR →
              </button>
            </div>
          )}

          {/* ── WORK / BREAK / DONE: timer circle ─────────── */}
          {(phase==="work"||phase==="break"||phase==="done") && (
            <>
              {combo>1 && phase==="work" && (
                <div style={{ textAlign:"center", marginBottom:8 }}>
                  <span style={{ background:"linear-gradient(135deg,#ff6b35,#ff4444)", borderRadius:20, padding:"4px 16px", ...orb, fontSize:11, color:"white", letterSpacing:1 }}>🔥 {combo}× KOMBO</span>
                </div>
              )}
              {phase!=="done" && (
                <div style={{ textAlign:"center", marginBottom:6 }}>
                  <span style={{ ...orb, fontSize:10, color:activeActObj.color, letterSpacing:2 }}>
                    {activeActObj.icon} {lang==="tr"?activeActObj.label:activeActObj.labelEn}
                    {activeTopic && <span style={{ color:T.textDim }}> · {activeTopic}</span>}
                  </span>
                </div>
              )}
              <div style={{ position:"relative", display:"flex", justifyContent:"center", marginBottom:20 }}>
                <svg width={260} height={260} style={{ transform:"rotate(-90deg)" }}>
                  <circle cx={130} cy={130} r={110} fill="none" stroke="rgba(255,255,255,0.04)" strokeWidth={12}/>
                  <circle cx={130} cy={130} r={110} fill="none" stroke={ringColor} strokeWidth={8} strokeLinecap="round"
                    strokeDasharray={CIRC} strokeDashoffset={CIRC*(1-progress)}
                    style={{ transition:"stroke-dashoffset 1s linear", filter:`drop-shadow(0 0 14px ${ringColor})` }}/>
                </svg>
                <div style={{ position:"absolute", inset:0, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center" }}>
                  {phase==="break" && <span style={{ fontSize:22, marginBottom:4 }}>🌿</span>}

  function toggle(id) {
    const done = checked.includes(id);
    if (!done) {
      const habPts = 5 + (bfx.habitBonus || 0);
      setChecked(p => [...p, id]);
      addPoints(habPts);
      addXP(3);
    } else setChecked(p => p.filter(x => x !== id));

    if (!newLabel.trim()) return;
    setHabits(p => [...p, { id:"h_"+Date.now(), label:newLabel.trim(), labelEn:newLabel.trim(), icon:newIcon, color:newColor, target:newTarget || "Günlük tutarlılık." }]);
    setNewLabel(""); setNewTarget(""); setShowAdd(false);
  }
  function removeHabit(id) { setHabits(p => p.filter(h => h.id !== id)); setChecked(p => p.filter(x => x !== id)); }
  function saveEdit(id) { setHabits(p => p.map(h => h.id === id ? { ...h, label:editLabel } : h)); setEditId(null); }

  const pct = habits.length ? Math.round((checked.length / habits.length) * 100) : 0;

  const last7 = Array.from({ length:7 }, (_, i) => { const d = new Date(); d.setDate(d.getDate() - 6 + i); return d.toDateString(); });

          <p style={{ ...orb, fontSize:9, color:T.textDim, marginTop:3 }}>

          </p>
        </div>
        <button onClick={() => setShowAdd(!showAdd)} style={{ ...btn(T.accent, { padding:"9px 16px", fontSize:11 }) }}>
          {t.addHabit}
        </button>

      {/* Streak + Progress */}
      <div style={{ display:"flex", gap:10, marginBottom:14 }}>
        <div style={{ flex:1, background:"rgba(255,160,0,0.08)", border:"1px solid rgba(255,160,0,0.2)", borderRadius:14, padding:"14px 16px", display:"flex", alignItems:"center", gap:10 }}>

          <div>
            <div style={{ ...orb, fontSize:24, color:"#ffd700", lineHeight:1 }}>{streak}</div>
            <div style={{ ...orb, fontSize:8, color:T.textDim, letterSpacing:1 }}>{t.streakDays}</div>
          </div>
        </div>
        <div style={{ flex:1, background:allDone ? "rgba(0,255,136,0.08)" : T.surface, border:allDone ? "1px solid rgba(0,255,136,0.25)" : `1px solid ${T.border}`, borderRadius:14, padding:"14px 16px" }}>

            <span style={{ ...orb, fontSize:9, color:T.textDim }}>{t.completedLabel}</span>
            <span style={{ ...orb, fontSize:13, color:allDone ? "#00ff88" : T.accent }}>{checked.length}/{habits.length}</span>
          </div>
          <div style={{ background:"rgba(255,255,255,0.05)", borderRadius:6, height:6, overflow:"hidden" }}>
            <div style={{ height:"100%", width:`${pct}%`, background:allDone ? "linear-gradient(90deg,#00ff88,#00c87a)" : `linear-gradient(90deg,${T.accent},${T.accent}88)`, borderRadius:6, transition:"width 0.5s ease" }} />

        <div style={{ display:"flex", gap:6, justifyContent:"space-between" }}>

                  border: isToday ? `1px solid ${T.accent}50` : "1px solid transparent",

          <input placeholder={t.habitDescPH} value={newTarget} onChange={e => setNewTarget(e.target.value)}

          <div style={{ display:"flex", gap:6, marginBottom:14 }}>

                boxShadow: done ? `0 0 16px ${h.color}50` : "none",

            {exp && (
              <div style={{ padding:"0 14px 14px", borderTop:`1px solid ${h.color}20` }}>
                <p style={{ fontSize:12, color:T.textMuted, lineHeight:1.6, marginTop:10, marginBottom:12, fontStyle:"italic" }}>{h.target}</p>

                  <button onClick={() => { setEditId(h.id); setEditLabel(label); }} style={{

                  <button onClick={() => removeHabit(h.id)} style={{
                    background:"rgba(255,50,50,0.06)", border:"1px solid rgba(255,50,50,0.25)", borderRadius:8,
                    padding:"7px 12px", color:"rgba(255,100,100,0.7)", cursor:"pointer", ...orb, fontSize:9,

      })}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════
   MIND SCREEN
   ═══════════════════════════════════════════════════════════════ */
function MindScreen() {
  const { T, t, lang, addPoints, addXP, todayKey, baseEffects } = useApp();
  const bfx = baseEffects || {};
  const dayIdx = (new Date().getDay() + 6) % 7;
  const todayGame = DAILY_GAMES[dayIdx];
  const [playedGames, setPlayedGames] = useLS("fb_playedGames3", {});
  const [activeGame, setActiveGame] = useState(null);
  const [gs, setGs] = useState(null);
  const reactionRef = useRef(null);

  function isPlayed(id) { return !!playedGames[id + "_" + todayKey]; }
  function getScore(id) { return playedGames[id + "_" + todayKey] || 0; }

  function finish(score) {
    if (!activeGame) return;
    setPlayedGames(p => ({ ...p, [activeGame.id + "_" + todayKey]: score }));
    const finalPts = Math.floor((20 + score) * (1 + (bfx.gameMultiplier || 0)));
    const finalXP = Math.floor((10 + score / 2) * (1 + (bfx.xpMultiplier || 0))) + (bfx.xpFlat || 0);
    addPoints(finalPts);
    addXP(finalXP);
    setGs(s => ({ ...s, phase:"result", score }));
    clearTimeout(reactionRef.current);
  }

  function genMath() {
    const ops = ["+","-","×"];
    const op = ops[Math.floor(Math.random()*3)];
    let a, b, ans;
    if (op==="+") { a=Math.floor(Math.random()*50)+1; b=Math.floor(Math.random()*50)+1; ans=a+b; }
    else if (op==="-") { a=Math.floor(Math.random()*50)+20; b=Math.floor(Math.random()*20)+1; ans=a-b; }
    else { a=Math.floor(Math.random()*12)+1; b=Math.floor(Math.random()*12)+1; ans=a*b; }
    const ch = new Set([ans]);
    while (ch.size < 4) ch.add(ans + Math.floor(Math.random()*20) - 10);
    return { q:`${a} ${op} ${b}`, ans, choices:[...ch].sort(() => Math.random()-0.5) };
  }
  function genPattern() {
    const its = ["🔵","🔴","🟡","🟢","🟣","🟠"];
    const g = Array.from({length:9}, () => its[Math.floor(Math.random()*its.length)]);
    const oi = Math.floor(Math.random()*9);
    g[oi] = its.filter(x => x !== g[oi])[Math.floor(Math.random()*5)];
    return { grid:g, answer:oi };
  }
  function genWord() {
    const w = WORDS[Math.floor(Math.random()*WORDS.length)];
    return { word:w, scrambled:w.split("").sort(() => Math.random()-0.5).join("") };
  }

  function startGame(game) {
    setActiveGame(game);
    clearTimeout(reactionRef.current);
    const id = game.id;
    if (id==="memory") {
      const em = ["🚀","⚡","🔬","📡","🛰️","🖥️","🏛️","🔭"];
      const cards = [...em,...em].sort(() => Math.random()-0.5);
      setGs({ phase:"show", cards, revealed:cards.map((_,i)=>i), matched:[], selected:[], score:0 });
      setTimeout(() => setGs(s => s ? {...s, phase:"play", revealed:[]} : s), 3000);
    }
    if (id==="math") { setGs({ phase:"play", ...genMath(), correct:0, total:0, score:0 }); }
    if (id==="pattern") { setGs({ phase:"play", ...genPattern(), score:0, answered:0 }); }
    if (id==="word") { setGs({ phase:"play", ...genWord(), guesses:[], currentGuess:"", score:0 }); }
    if (id==="sequence") {
      const seq = Array.from({length:4}, () => Math.floor(Math.random()*9)+1);
      setGs({ phase:"show", sequence:seq, step:0, round:0, score:0 });
      setTimeout(() => setGs(s => s ? {...s, phase:"play"} : s), 2500);
    }
    if (id==="color") {
      const cols = ["#ff4444","#00e5ff","#00ff88","#ffd700","#a78bfa","#ff6b35"];
      const seq = Array.from({length:4}, () => cols[Math.floor(Math.random()*cols.length)]);
      setGs({ phase:"show", sequence:seq, step:0, score:0 });
      setTimeout(() => setGs(s => s ? {...s, phase:"play"} : s), 3000);
    }
    if (id==="reaction") {
      setGs({ phase:"waiting", scores:[], round:0, maxRounds:5, score:0, showTarget:false });
      scheduleReaction(2000 + Math.random()*2000);
    }
  }

  function scheduleReaction(d) {
    clearTimeout(reactionRef.current);
    reactionRef.current = setTimeout(() => setGs(s => s ? {...s, showTarget:true, shownAt:Date.now()} : s), d);
  }

  function memCard(idx) {
    if (!gs || gs.phase !== "play") return;
    const { cards, revealed, matched, selected } = gs;
    if (matched.includes(idx) || revealed.includes(idx) || selected.length >= 2) return;
    const ns = [...selected, idx];
    const nr = [...revealed, idx];
    if (ns.length === 2) {
      const [a, b] = ns;
      if (cards[a] === cards[b]) {
        const nm = [...matched, a, b];
        const sc = gs.score + 15;
        if (nm.length === cards.length) {
          setGs(s => ({...s, revealed:nr, matched:nm, selected:[], score:sc, phase:"result"}));
          setPlayedGames(p => ({...p, ["memory_"+todayKey]: sc}));
          addPoints(20+sc); addXP(Math.floor(10+sc/2));
        } else {
          setGs(s => ({...s, revealed:nr, matched:nm, selected:[], score:sc}));
        }
      } else {
        setGs(s => ({...s, revealed:nr, selected:ns}));
        setTimeout(() => setGs(s => s ? {...s, revealed:s.revealed.filter(i => !ns.includes(i)), selected:[]} : s), 800);
      }
    } else {
      setGs(s => ({...s, revealed:nr, selected:ns}));
    }
  }
  function mathAns(c) {
    if (!gs || gs.phase !== "play") return;
    const ok = c === gs.ans;
    const nc = gs.correct + (ok ? 1 : 0);
    const nt = gs.total + 1;
    const ns = gs.score + (ok ? 10 : 0);
    if (nt >= 8) finish(ns);
    else setGs(s => ({...s, ...genMath(), correct:nc, total:nt, score:ns}));
  }
  function patternAns(idx) {
    if (!gs || gs.phase !== "play") return;
    const ok = idx === gs.answer;
    const ns = gs.score + (ok ? 15 : 0);
    const na = gs.answered + 1;
    if (na >= 5) finish(ns);
    else setGs(s => ({...s, ...genPattern(), score:ns, answered:na}));
  }
  function wordGuess() {
    if (!gs) return;
    const u = gs.currentGuess.toUpperCase().trim();
    if (u === gs.word) finish(30);
    else setGs(s => ({...s, guesses:[...s.guesses, u], currentGuess:"", score:Math.max(0, s.score-3)}));
  }
  function colorTap(c) {
    if (!gs || gs.phase !== "play") return;
    if (c === gs.sequence[gs.step]) {
      const ns = gs.step + 1;
      if (ns >= gs.sequence.length) finish(25);
      else setGs(s => ({...s, step:ns}));
    } else finish(gs.score);
  }
  function seqTap(n) {
    if (!gs || gs.phase !== "play") return;
    if (n === gs.sequence[gs.step]) {
      const ns = gs.step + 1;
      if (ns >= gs.sequence.length) {
        if (gs.round >= 2) finish(gs.score + 20);
        else {
          const newSeq = [...gs.sequence, Math.floor(Math.random()*9)+1];
          setGs(s => ({...s, phase:"show", sequence:newSeq, step:0, round:(s.round||0)+1, score:s.score+10}));
          setTimeout(() => setGs(s => s ? {...s, phase:"play", step:0} : s), 2500);
        }
      } else setGs(s => ({...s, step:ns}));
    } else finish(gs.score);
  }
  function reactionTap() {
    if (!gs || !gs.showTarget) return;
    const rt = Date.now() - gs.shownAt;
    const ns = [...(gs.scores||[]), rt];
    const nr = (gs.round||0) + 1;
    if (nr >= gs.maxRounds) {
      const avg = ns.reduce((a,b) => a+b, 0) / ns.length;
      finish(Math.max(0, Math.floor((600-avg)/6)));
    } else {
      setGs(s => ({...s, scores:ns, round:nr, showTarget:false}));
      scheduleReaction(1500 + Math.random()*2000);
    }
  }

  // Active game view
  if (activeGame && gs) {
    const g = activeGame;
    const gName = lang === "tr" ? g.nameTr : g.nameEn;
    return (
      <div style={{ padding:"16px 16px 100px" }}>
        <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:20 }}>
          <button onClick={() => { setActiveGame(null); setGs(null); clearTimeout(reactionRef.current); }}
            style={{ background:"none", border:`1px solid ${T.border}`, borderRadius:8, padding:"7px 12px", color:T.textMuted, cursor:"pointer", fontSize:12 }}>
            ← {t.close}
          </button>
          <h2 style={{ ...orb, fontSize:14, color:g.color, letterSpacing:2 }}>{g.icon} {gName}</h2>
        </div>

        {/* MEMORY */}
        {g.id === "memory" && (
          gs.phase === "result"
            ? <GameResult score={gs.score} max={120} color={g.color} label="EŞLEŞTİRİLEN KART" lang={lang} gameMult={bfx.gameMultiplier||0} xpMult={bfx.xpMultiplier||0} xpFlatBonus={bfx.xpFlat||0} />
            : <>
                {gs.phase === "show" && <div style={{ textAlign:"center", ...orb, color:"#ffd700", fontSize:11, letterSpacing:2, marginBottom:10 }}>{t.memorizeHint}</div>}
                <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:8 }}>
                  {gs.cards.map((em, i) => {
                    const rev = gs.revealed.includes(i) || gs.matched.includes(i);
                    const mat = gs.matched.includes(i);
                    return (
                      <div key={i} onClick={() => memCard(i)} style={{
                        aspectRatio:"1", borderRadius:12, cursor:"pointer",
                        background: mat ? "rgba(0,255,136,0.15)" : rev ? `${g.color}15` : "rgba(255,255,255,0.04)",
                        border: mat ? "1px solid rgba(0,255,136,0.4)" : rev ? `1px solid ${g.color}40` : `1px solid ${T.border}`,
                        display:"flex", alignItems:"center", justifyContent:"center",
                        fontSize:28, transition:"all 0.2s",
                      }}>{rev ? em : "?"}</div>
                    );
                  })}
                </div>
              </>
        )}

        {/* MATH */}
        {g.id === "math" && (
          gs.phase === "result"
            ? <GameResult score={gs.score} max={80} color={g.color} label={`${t.correctLabel}: ${gs.correct}/8`} lang={lang} gameMult={bfx.gameMultiplier||0} xpMult={bfx.xpMultiplier||0} xpFlatBonus={bfx.xpFlat||0} />
            : <div style={{ textAlign:"center" }}>
                <div style={{ ...orb, fontSize:10, color:T.textDim, marginBottom:8 }}>{(gs.total||0)+1}/8</div>
                <div style={{ ...glowCard(g.color, T, { padding:"28px 20px", marginBottom:22 }) }}>
                  <span style={{ ...orb, fontSize:44, color:T.text }}>{gs.q} = ?</span>
                </div>
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
                  {gs.choices.map(c => (
                    <button key={c} onClick={() => mathAns(c)} style={{ ...btn(g.color, { padding:"18px", fontSize:22, borderRadius:14, color:"#050a14" }), fontFamily:"'Orbitron',sans-serif" }}>{c}</button>
                  ))}
                </div>
              </div>
        )}

        {/* PATTERN */}
        {g.id === "pattern" && (
          gs.phase === "result"
            ? <GameResult score={gs.score} max={75} color={g.color} label="FARK PUANI" lang={lang} gameMult={bfx.gameMultiplier||0} xpMult={bfx.xpMultiplier||0} xpFlatBonus={bfx.xpFlat||0} />
            : <div style={{ textAlign:"center" }}>
                <p style={{ color:T.textMuted, fontSize:12, marginBottom:16 }}>Diğerlerinden farklı olanı bul</p>
                <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:10, maxWidth:240, margin:"0 auto" }}>
                  {gs.grid.map((em, i) => (
                    <button key={i} onClick={() => patternAns(i)} style={{ aspectRatio:"1", borderRadius:12, fontSize:36, cursor:"pointer", background:"rgba(255,255,255,0.04)", border:`1px solid ${T.border}`, display:"flex", alignItems:"center", justifyContent:"center" }}>{em}</button>
                  ))}
                </div>
              </div>
        )}

        {/* WORD */}
        {g.id === "word" && (
          gs.phase === "result"
            ? <GameResult score={gs.score} max={30} color={g.color} label={"CEVAP: " + gs.word} lang={lang} gameMult={bfx.gameMultiplier||0} xpMult={bfx.xpMultiplier||0} xpFlatBonus={bfx.xpFlat||0} />
            : <div style={{ textAlign:"center" }}>
                <p style={{ color:T.textMuted, fontSize:12, marginBottom:14 }}>Harfleri doğru sıraya diz:</p>
                <div style={{ ...glowCard(g.color, T, { padding:"22px", marginBottom:20 }) }}>
                  <span style={{ ...orb, fontSize:36, color:g.color, letterSpacing:10 }}>{gs.scrambled}</span>
                </div>
                <div style={{ ...orb, fontSize:10, color:T.textDim, marginBottom:8 }}>{t.attemptsLabel} {gs.guesses.join(", ") || "—"}</div>
                <input value={gs.currentGuess} onChange={e => setGs(s => ({...s, currentGuess:e.target.value}))}
                  onKeyDown={e => e.key === "Enter" && wordGuess()} placeholder={t.answerPH} autoFocus
                  style={{ width:"100%", background:T.inputBg, border:`1px solid ${g.color}50`, borderRadius:12, padding:"14px 16px", color:T.text, fontSize:18, textAlign:"center", outline:"none", marginBottom:12, ...orb, letterSpacing:4, textTransform:"uppercase" }} />
                <button onClick={wordGuess} style={{ ...btn(g.color, { padding:"14px 40px", fontSize:14 }) }}>{t.answerBtn}</button>
              </div>
        )}

        {/* COLOR */}
        {g.id === "color" && (
          <>
            {gs.phase === "show" && (
              <div style={{ textAlign:"center" }}>
                <div style={{ ...orb, color:"#ffd700", fontSize:11, letterSpacing:2, marginBottom:16 }}>SIRALAMAYI EZBERLE!</div>
                <div style={{ display:"flex", gap:10, justifyContent:"center" }}>
                  {gs.sequence.map((c, i) => <div key={i} style={{ width:56, height:56, borderRadius:12, background:c, boxShadow:`0 0 18px ${c}` }} />)}
                </div>
              </div>
            )}
            {gs.phase === "play" && (
              <div style={{ textAlign:"center" }}>
                <div style={{ ...orb, color:T.textDim, fontSize:10, letterSpacing:2, marginBottom:12 }}>{gs.step+1}. rengi seç</div>
                <div style={{ display:"flex", flexWrap:"wrap", gap:12, justifyContent:"center" }}>
                  {["#ff4444","#00e5ff","#00ff88","#ffd700","#a78bfa","#ff6b35"].map(c => (
                    <button key={c} onClick={() => colorTap(c)} style={{ width:78, height:78, borderRadius:16, background:c, border:"none", cursor:"pointer", boxShadow:`0 0 18px ${c}55` }} />
                  ))}
                </div>
              </div>
            )}
            {gs.phase === "result" && <GameResult score={gs.score} max={25} color={g.color} label="RENK SIRASI" lang={lang} gameMult={bfx.gameMultiplier||0} xpMult={bfx.xpMultiplier||0} xpFlatBonus={bfx.xpFlat||0} />}
          </>
        )}

        {/* SEQUENCE */}
        {g.id === "sequence" && (
          <>
            {gs.phase === "show" && (
              <div style={{ textAlign:"center" }}>
                <div style={{ ...orb, color:"#ffd700", fontSize:11, letterSpacing:2, marginBottom:16 }}>{t.sequenceHint}</div>
                <div style={{ display:"flex", gap:8, justifyContent:"center" }}>
                  {gs.sequence.map((n, i) => (
                    <div key={i} style={{ width:52, height:52, borderRadius:12, ...glowCard(g.color, T, { display:"flex", alignItems:"center", justifyContent:"center" }) }}>
                      <span style={{ ...orb, fontSize:22, color:g.color }}>{n}</span>
                    </div>
                  ))}
                </div>
              </div>
            )}
            {gs.phase === "play" && (
              <div style={{ textAlign:"center" }}>
                <div style={{ ...orb, color:T.textDim, fontSize:10, marginBottom:14 }}>
                  {gs.step+1}. rakam · {t.roundLabel} {(gs.round||0)+1}/3
                </div>
                <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:10, maxWidth:280, margin:"0 auto" }}>
                  {[1,2,3,4,5,6,7,8,9].map(n => (
                    <button key={n} onClick={() => seqTap(n)} style={{ ...btn(g.color, { aspectRatio:"1", fontSize:24, borderRadius:14, color:"#050a14", fontFamily:"'Orbitron',sans-serif" }) }}>{n}</button>
                  ))}
                </div>
              </div>
            )}
            {gs.phase === "result" && <GameResult score={gs.score} max={60} color={g.color} label="DİZİ PUANI" lang={lang} gameMult={bfx.gameMultiplier||0} xpMult={bfx.xpMultiplier||0} xpFlatBonus={bfx.xpFlat||0} />}
          </>
        )}

        {/* REACTION */}
        {g.id === "reaction" && (
          gs.phase === "result"
            ? <GameResult score={gs.score} max={80} color={g.color} label={"ORT: " + (gs.scores?.length ? Math.round(gs.scores.reduce((a,b)=>a+b,0)/gs.scores.length) : 0) + "ms"} lang={lang} gameMult={bfx.gameMultiplier||0} xpMult={bfx.xpMultiplier||0} xpFlatBonus={bfx.xpFlat||0} />
            : <div style={{ textAlign:"center" }}>
                <div style={{ ...orb, color:T.textDim, fontSize:10, marginBottom:8 }}>{t.roundLabel} {(gs.round||0)}/{gs.maxRounds}</div>
                <div onClick={reactionTap} style={{
                  width:180, height:180, borderRadius:"50%", margin:"20px auto",
                  background: gs.showTarget ? `radial-gradient(circle,${g.color},${g.color}88)` : "rgba(255,255,255,0.04)",
                  border: gs.showTarget ? `2px solid ${g.color}` : `2px solid ${T.border}`,
                  display:"flex", alignItems:"center", justifyContent:"center",
                  cursor: gs.showTarget ? "pointer" : "default", transition:"all 0.1s",
                  boxShadow: gs.showTarget ? `0 0 60px ${g.color}60` : "none",
                }}>
                  <span style={{ ...orb, fontSize:gs.showTarget?14:11, color:gs.showTarget?"#050a14":T.textDim, letterSpacing:2 }}>
                    {gs.showTarget ? t.tapLabel : t.waitingLabel}
                  </span>
                </div>
                {gs.scores?.length > 0 && <div style={{ fontSize:11, color:T.textMuted }}>Son: {gs.scores[gs.scores.length-1]}ms</div>}
              </div>
        )}
      </div>
    );
  }

  // Calendar view
  return (
    <div style={{ padding:"16px 16px 100px" }}>
      <h2 style={{ ...orb, fontSize:14, color:T.textMuted, letterSpacing:3, marginBottom:6 }}>{t.mindTitle}</h2>
      <p style={{ fontSize:11, color:T.textDim, marginBottom:18, lineHeight:1.5 }}>Her gün farklı oyun. Zincirini kırma.</p>

      {/* Weekly grid */}
      <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:6, marginBottom:18 }}>
        {DAILY_GAMES.map((g, i) => {
          const isT = i === dayIdx;
          const pl = isPlayed(g.id);
          return (
            <div key={g.id} style={{ textAlign:"center" }}>
              <div style={{ ...orb, fontSize:8, color:isT ? g.color : T.textDim, marginBottom:4, letterSpacing:0.3 }}>
                {t.days[i]}
              </div>
              <div style={{
                aspectRatio:"1", borderRadius:10, fontSize:17, position:"relative",
                background: pl ? `${g.color}22` : isT ? "rgba(255,255,255,0.07)" : "rgba(255,255,255,0.02)",
                border: isT ? `2px solid ${g.color}` : pl ? `1px solid ${g.color}50` : `1px solid ${T.border}`,
                display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center",
                boxShadow: isT ? `0 0 14px ${g.color}30` : "none",
              }}>
                {g.icon}
                {pl && <div style={{ position:"absolute", bottom:-2, right:-2, width:13, height:13, borderRadius:"50%", background:"#00ff88", fontSize:7, display:"flex", alignItems:"center", justifyContent:"center", color:"#050a14", fontWeight:700 }}>✓</div>}
              </div>
              {pl && <div style={{ ...orb, fontSize:7, color:g.color, marginTop:3 }}>{getScore(g.id)}p</div>}
            </div>
          );
        })}
      </div>

      {/* Today featured */}
      <div style={{ ...glowCard(todayGame.color, T, { padding:20, marginBottom:14 }) }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:14 }}>
          <div>
            <div style={{ ...orb, fontSize:9, color:T.textDim, letterSpacing:2, marginBottom:6 }}>{t.todayGame}</div>
            <div style={{ ...orb, fontSize:20, color:todayGame.color, letterSpacing:1 }}>{todayGame.icon} {lang === "tr" ? todayGame.nameTr : todayGame.nameEn}</div>
            <div style={{ fontSize:12, color:T.textMuted, marginTop:4 }}>{todayGame.desc}</div>
          </div>
          <span style={{ fontSize:44 }}>{todayGame.icon}</span>
        </div>
        <div style={{ display:"flex", gap:8, marginBottom:14 }}>
          {[[t.rewardLabel,"+20⚡"],[t.durLabel,"~60s"],[t.perDayLabel,"1×"]].map(([k,v]) => (
            <div key={k} style={{ flex:1, ...card(T, { padding:"8px 6px", textAlign:"center" }) }}>
              <div style={{ ...orb, fontSize:8, color:T.textDim }}>{k}</div>
              <div style={{ ...orb, fontSize:11, color:todayGame.color, marginTop:2 }}>{v}</div>
            </div>
          ))}
        </div>
        {isPlayed(todayGame.id) ? (
          <div style={{ padding:"12px", textAlign:"center", ...orb, fontSize:11, color:"#00ff88", letterSpacing:2 }}>
            ✓ {t.playedLabel} · {getScore(todayGame.id)} PUAN
          </div>
        ) : (
          <button onClick={() => startGame(todayGame)} style={{ ...btn(todayGame.color, { width:"100%", padding:"15px", fontSize:14 }) }}>
            {t.playBtn}
          </button>
        )}
      </div>

      {/* Other games */}
      <div style={{ ...orb, fontSize:9, color:T.textDim, letterSpacing:2, marginBottom:10 }}>{t.otherDays}</div>
      {DAILY_GAMES.filter((_, i) => i !== dayIdx).map(g => {
        const pl = isPlayed(g.id);
        return (
          <div key={g.id} style={{ ...card(T, { padding:"12px 14px", display:"flex", gap:12, alignItems:"center", marginBottom:8, opacity:0.65 }) }}>
            <span style={{ fontSize:24 }}>{g.icon}</span>
            <div style={{ flex:1 }}>
              <div style={{ fontSize:13, color:T.text }}>{lang === "tr" ? g.nameTr : g.nameEn}</div>
              <div style={{ fontSize:11, color:T.textMuted }}>{g.desc}</div>
            </div>
            {pl
              ? <span style={{ ...orb, fontSize:10, color:"#00ff88" }}>✓ {getScore(g.id)}p</span>
              : <span style={{ ...orb, fontSize:9, color:T.textDim }}>{t.laterLabel}</span>
            }
          </div>
        );
      })}
    </div>
  );
}

function SettingsScreen() {

  const [history]        = useLS("fb_history", []);
  const [showConfirm,  setShowConfirm]  = useState(false);
  const [showResetXP,  setShowResetXP]  = useState(false);
  const [activeSection, setActiveSection] = useState(null);

  const totalMins = history.reduce((s, h) => s + (h.min || 0), 0);
  const set = (key, val) => setSettings(s => ({...s, [key]: val}));
  const tog = (key)      => setSettings(s => ({...s, [key]: !s[key]}));

  const SP = { T, activeSection, setActiveSection }; // shorthand for section props
