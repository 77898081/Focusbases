/* ═══════════════════════════════════════════════════════════════
   ANALYTICS SCREEN
   ═══════════════════════════════════════════════════════════════ */
function AnalyticsScreen() {
  const { T, t, lang, xp, level, sessions, streak, baseEffects, settings } = useApp();
  const [history]      = useLS("fb_history", []);
  const [totalFocus]   = useLS("fb_totalFocus", 0);
  const [playedGames]  = useLS("fb_playedGames3", {});
  const [combo]        = useLS("fb_combo", 0);
  const [distractors, setDistractors] = useLS("fb_distractors", { phone:0, noise:0, fatigue:0, hunger:0, other:0 });
  const [activityStats] = useLS("fb_activity_stats", {});
  const [tab, setTab]  = useState("overview");
  const [reportRange, setReportRange] = useState("daily");
  const [showDistModal, setShowDistModal] = useState(false);
  const bfx = baseEffects || {};

  const todayKey    = new Date().toDateString();
  const todayMins   = history.filter(h => h.date === todayKey).reduce((s,h) => s+(h.min||0), 0);
  const todaySessions = history.filter(h => h.date === todayKey).length;
  const weekMins    = (() => { const d = new Date(); return history.filter(h => { const hd=new Date(h.date); return (d-hd)<7*864e5; }).reduce((s,h)=>s+(h.min||0),0); })();
  const totalMins   = history.reduce((s,h) => s+(h.min||0), 0);

  const mentalScore = useMemo(() => {
    let s = 0;
    s += Math.min(25, streak * 3);
    s += Math.min(25, Math.floor(totalFocus / 10));
    s += Math.min(20, sessions * 2);
    s += Math.min(15, Math.floor(xp / 50));
    s += Math.min(15, Math.floor((bfx.oxygenBonus || 0) / 5));
    return Math.min(100, s);
  }, [streak, totalFocus, sessions, xp, bfx.oxygenBonus]);

  const mentalColor = mentalScore >= 85 ? "#00ff88" : mentalScore >= 65 ? "#00e5ff" : mentalScore >= 45 ? "#ffd700" : mentalScore >= 25 ? "#ff6b35" : "#a78bfa";
  const mentalLabel = mentalScore >= 85 ? "DORUK" : mentalScore >= 65 ? "GÜÇLÜ" : mentalScore >= 45 ? "GELİŞİYOR" : mentalScore >= 25 ? "UYANIK" : "BAŞLANGIÇ";

  const hourlyData = useMemo(() => {
    const counts = Array(24).fill(0);
    history.forEach(h => {
      if (h.at) { const hr = parseInt((h.at||"").split(":")[0]); if (!isNaN(hr) && hr >= 0 && hr < 24) counts[hr] += (h.min||25); }
    });
    return counts;
  }, [history]);

  const peakHour  = hourlyData.reduce((best,v,i) => v > hourlyData[best] ? i : best, 0);
  const peakLabel = peakHour < 6 ? "Gece" : peakHour < 12 ? "Sabah" : peakHour < 18 ? "Öğleden Sonra" : "Akşam";

  const last14 = useMemo(() => Array.from({length:14}, (_,i) => {
    const d = new Date(); d.setDate(d.getDate()-13+i);
    const key = d.toDateString();
    const mins = history.filter(h=>h.date===key).reduce((s,h)=>s+(h.min||0),0);
    const dayN = (d.getDay()+6)%7;
    return { day:["Pzt","Sal","Çar","Per","Cum","Cmt","Paz"][dayN], mins, key, isToday:i===13 };
  }), [history]);

  const last7 = last14.slice(7);
  const maxMins14 = Math.max(...last14.map(d=>d.mins),1);
  const prevWeekMins = last14.slice(0,7).reduce((s,d)=>s+d.mins,0);
  const weekTrend = prevWeekMins > 0 ? Math.round(((weekMins-prevWeekMins)/prevWeekMins)*100) : 0;

  const focusRings = useMemo(() => {
    const total = history.length || 1;
    return [
      { label:"Kısa (<25dk)",  color:"#a78bfa", pct:Math.round((history.filter(h=>(h.min||0)<25).length/total)*100),  count:history.filter(h=>(h.min||0)<25).length },
      { label:"Orta (25-44dk)",color:"#00e5ff", pct:Math.round((history.filter(h=>(h.min||0)>=25&&(h.min||0)<45).length/total)*100), count:history.filter(h=>(h.min||0)>=25&&(h.min||0)<45).length },
      { label:"Derin (45+dk)", color:"#00ff88", pct:Math.round((history.filter(h=>(h.min||0)>=45).length/total)*100),  count:history.filter(h=>(h.min||0)>=45).length },
    ];
  }, [history]);

  const trendPath = useMemo(() => {
    if (last14.every(d=>d.mins===0)) return null;
    const W=340, H=80, max=Math.max(...last14.map(d=>d.mins),1);
    const pts = last14.map((d,i) => { const x=(i/13)*(W-20)+10; const y=H-10-((d.mins/max)*(H-20)); return [x,y]; });
    const path = pts.map((p,i) => { if(i===0) return `M${p[0]} ${p[1]}`; const prev=pts[i-1]; const cpx=(prev[0]+p[0])/2; return `C${cpx} ${prev[1]} ${cpx} ${p[1]} ${p[0]} ${p[1]}`; }).join(" ");
    const fill = `M${pts[0][0]} ${H} `+pts.map(p=>`L${p[0]} ${p[1]}`).join(" ")+` L${pts[pts.length-1][0]} ${H} Z`;
    return { path, fill, pts };
  }, [last14]);

  const qualityScore = useMemo(() => {
    if (!history.length) return 0;
    const avgMin = totalFocus / Math.max(sessions,1);
    const consistency = last7.filter(d=>d.mins>0).length/7;
    const deepPct = focusRings[2].pct/100;
    return Math.min(100, Math.round((Math.min(avgMin/60,1)*40)+(consistency*35)+(deepPct*25)));
  }, [history, totalFocus, sessions, last7, focusRings]);

  const qualityColor = qualityScore >= 80 ? "#00ff88" : qualityScore >= 55 ? "#00e5ff" : qualityScore >= 30 ? "#ffd700" : "#ff6b35";
  const qualityLabel = qualityScore >= 80 ? "ELİT" : qualityScore >= 55 ? "GÜÇLÜ" : qualityScore >= 30 ? "GELİŞİYOR" : "BAŞLANGIÇ";

  const distItems = [
    { key:"phone",   label:"Telefon",   icon:"📱", color:"#ff6b35" },
    { key:"noise",   label:"Gürültü",   icon:"🔊", color:"#ffd700" },
    { key:"fatigue", label:"Yorgunluk", icon:"😴", color:"#a78bfa" },
    { key:"hunger",  label:"Açlık",     icon:"🍎", color:"#22c55e" },
    { key:"other",   label:"Diğer",     icon:"❓", color:"#94a3b8" },
  ];
  const totalDist = Object.values(distractors).reduce((s,v)=>s+v,0);
  const maxDist   = Math.max(...Object.values(distractors),1);

  const dailyGoal = settings.dailyGoal || 120;
  const goalPct   = Math.min(100, Math.round((todayMins/dailyGoal)*100));
  const goalColor = goalPct>=100?"#00ff88":goalPct>=60?"#ffd700":T.accent;

  const report = useMemo(() => {
    if (reportRange==="daily") return {
      title:"GÜNLÜK RAPOR",
      period:new Date().toLocaleDateString("tr-TR",{weekday:"long",day:"numeric",month:"long"}),
      stats:[
        {label:"Bugün Odak",  value:todayMins+"dk",   icon:"⏱️"},
        {label:"Tamamlanan",  value:todaySessions+"s",  icon:"🎯"},
        {label:"Zihin Skoru", value:mentalScore+"/100", icon:"🧠"},
        {label:"Streak",      value:streak+" gün",     icon:"🔥"},
      ],
      insight:todayMins>=120?"Harika bir gün! Zihnin keskin çalışıyor.":todayMins>=60?"İyi performans.":todayMins>0?"Başlangıç yapıldı.":"Bugün henüz seans yok.",
    };
    if (reportRange==="weekly") return {
      title:"HAFTALIK RAPOR", period:"Son 7 Gün",
      stats:[
        {label:"Toplam Odak", value:weekMins+"dk",                            icon:"⏱️"},
        {label:"Ort. Günlük", value:Math.round(weekMins/7)+"dk/gün",          icon:"📊"},
        {label:"Aktif Gün",   value:last7.filter(d=>d.mins>0).length+"/7",    icon:"📅"},
        {label:"Hafta Trend", value:(weekTrend>=0?"+":"")+weekTrend+"%",      icon:weekTrend>=0?"📈":"📉"},
      ],
      insight:weekMins>=600?"İstisnayi bir hafta!":weekMins>=300?"Güçlü bir hafta.":weekMins>=120?"Ortalama bir hafta.":"Hafif bir hafta.",
    };
    return {
      title:"AYLIK RAPOR",
      period:new Date().toLocaleDateString("tr-TR",{month:"long",year:"numeric"}),
      stats:[
        {label:"Toplam Odak",  value:totalFocus+"dk",   icon:"⏱️"},
        {label:"Toplam Seans", value:sessions+"s",       icon:"🎯"},
        {label:"Kazanılan XP", value:xp+" XP",           icon:"⭐"},
        {label:"Odak Kalite",  value:qualityScore+"/100",icon:"💎"},
      ],
      insight:sessions>=50?"Bir aylık inanılmaz birikim!":sessions>=20?"Güçlü bir ay.":sessions>=5?"İyi başlangıç.":"Yolculuk başlıyor.",
    };
  }, [reportRange, todayMins, todaySessions, mentalScore, streak, weekMins, weekTrend, totalFocus, sessions, xp, qualityScore]);

  return (
    <div style={{ padding:"16px 16px 100px" }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
        <h2 style={{ ...orb, fontSize:14, color:T.textMuted, letterSpacing:3 }}>ANALİTİK MERKEZİ</h2>
        <button onClick={()=>setShowDistModal(!showDistModal)} style={{ background:"rgba(255,107,53,0.15)", border:"1px solid rgba(255,107,53,0.3)", borderRadius:10, padding:"7px 12px", color:"#ff6b35", cursor:"pointer", ...orb, fontSize:9, letterSpacing:1 }}>⚠️ DİKKAT</button>
      </div>

      {showDistModal && (
        <div style={{ background:"rgba(255,107,53,0.08)", border:"1px solid rgba(255,107,53,0.3)", borderRadius:16, padding:16, marginBottom:14 }}>
          <div style={{ display:"flex", justifyContent:"space-between", marginBottom:12 }}>
            <div style={{ ...orb, fontSize:10, color:"#ff6b35" }}>DİKKAT DAĞITICILARI KAYDET</div>
            <button onClick={()=>setShowDistModal(false)} style={{ background:"none", border:"none", color:T.textDim, fontSize:18, cursor:"pointer" }}>×</button>
          </div>
          <div style={{ display:"flex", flexWrap:"wrap", gap:8 }}>
            {distItems.map(item => (
              <button key={item.key} onClick={()=>setDistractors(d=>({...d,[item.key]:(d[item.key]||0)+1}))} style={{ background:`${item.color}15`, border:`1px solid ${item.color}40`, borderRadius:12, padding:"8px 12px", cursor:"pointer", display:"flex", alignItems:"center", gap:6 }}>
                <span style={{ fontSize:18 }}>{item.icon}</span>
                <div style={{ textAlign:"left" }}>
                  <div style={{ ...orb, fontSize:9, color:item.color }}>{item.label}</div>
                  <div style={{ ...orb, fontSize:8, color:T.textDim }}>×{distractors[item.key]||0}</div>
                </div>
              </button>
            ))}
          </div>
        </div>
      )}

      <div style={{ display:"flex", gap:6, marginBottom:18, overflowX:"auto" }}>
        {[["overview","🧠 Genel"],["trends","📈 Trend"],["quality","💎 Kalite"],["report","📋 Rapor"]].map(([id,label])=>(
          <button key={id} onClick={()=>setTab(id)} style={{ flexShrink:0, padding:"8px 14px", borderRadius:10, cursor:"pointer", background:tab===id?`linear-gradient(135deg,${T.accent},${T.accent}88)`:"rgba(255,255,255,0.04)", border:tab===id?"none":`1px solid ${T.border}`, color:tab===id?"#050a14":T.textMuted, ...orb, fontSize:10, letterSpacing:1, whiteSpace:"nowrap" }}>{label}</button>
        ))}
      </div>

      {tab==="overview" && (
        <>
          {/* Mental Score */}
          <div style={{ background:`${mentalColor}15`, border:`1px solid ${mentalColor}35`, borderRadius:20, padding:20, marginBottom:14, textAlign:"center" }}>
            <div style={{ ...orb, fontSize:9, color:T.textDim, letterSpacing:3, marginBottom:12 }}>ZİHİNSEL DURUM SKORU</div>
            <div style={{ position:"relative", width:130, height:130, margin:"0 auto 14px" }}>
              <svg width={130} height={130} style={{ transform:"rotate(-90deg)" }}>
                <circle cx={65} cy={65} r={52} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth={10}/>
                <circle cx={65} cy={65} r={52} fill="none" stroke={mentalColor} strokeWidth={10} strokeLinecap="round"
                  strokeDasharray={2*Math.PI*52} strokeDashoffset={2*Math.PI*52*(1-mentalScore/100)}
                  style={{ filter:`drop-shadow(0 0 8px ${mentalColor})` }}/>
              </svg>
              <div style={{ position:"absolute", inset:0, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center" }}>
                <div style={{ ...orb, fontSize:30, color:mentalColor, lineHeight:1 }}>{mentalScore}</div>
                <div style={{ ...orb, fontSize:9, color:mentalColor, letterSpacing:2, marginTop:4 }}>{mentalLabel}</div>
              </div>
            </div>
            <div style={{ display:"flex", gap:10, justifyContent:"center" }}>
              {[{label:"Streak",value:streak,icon:"🔥",color:"#ff6b35"},{label:"Seans",value:sessions,icon:"🎯",color:"#00e5ff"},{label:"XP",value:xp,icon:"⭐",color:"#ffd700"}].map(item=>(
                <div key={item.label} style={{ flex:1, background:"rgba(0,0,0,0.2)", borderRadius:12, padding:"10px 6px", textAlign:"center" }}>
                  <div style={{ fontSize:16, marginBottom:4 }}>{item.icon}</div>
                  <div style={{ ...orb, fontSize:14, color:item.color }}>{item.value}</div>
                  <div style={{ ...orb, fontSize:7, color:T.textDim, marginTop:2 }}>{item.label}</div>
                </div>
              ))}
            </div>
          </div>

          {/* Daily Goal */}
          <div style={{ background:`${goalColor}10`, border:`1px solid ${goalColor}30`, borderRadius:16, padding:16, marginBottom:14 }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
              <div style={{ ...orb, fontSize:9, color:T.textDim, letterSpacing:2 }}>GÜNLÜK ODAK HEDEFİ</div>
              <span style={{ ...orb, fontSize:11, color:goalColor }}>{goalPct>=100?"✓ TAMAMLANDI":`${dailyGoal-todayMins}dk kaldı`}</span>
            </div>
            <div style={{ background:"rgba(255,255,255,0.05)", borderRadius:8, height:10, overflow:"hidden", marginBottom:8 }}>
              <div style={{ height:"100%", width:`${goalPct}%`, background:`linear-gradient(90deg,${goalColor},${goalColor}88)`, borderRadius:8, transition:"width 0.8s ease" }}/>
            </div>
            <div style={{ display:"flex", justifyContent:"space-between" }}>
              <span style={{ ...orb, fontSize:10, color:T.text }}>{todayMins}dk odaklandın</span>
              <span style={{ ...orb, fontSize:10, color:T.textDim }}>Hedef: {dailyGoal}dk</span>
            </div>
          </div>

          {/* Difficulty breakdown */}
          {history.length>0 && (
            <div style={{ background:T.surface, border:`1px solid ${T.border}`, borderRadius:16, padding:16, marginBottom:14 }}>
              <div style={{ ...orb, fontSize:9, color:T.textDim, letterSpacing:2, marginBottom:14 }}>ZORLUK DAĞILIMI</div>
              <div style={{ display:"flex", gap:10 }}>
                {[{label:"Kolay",color:"#00ff88",count:history.filter(h=>h.difficulty===1||!h.difficulty).length},{label:"Orta",color:"#ffd700",count:history.filter(h=>h.difficulty===2).length},{label:"Zor",color:"#ff6b35",count:history.filter(h=>h.difficulty===3).length}].map(item=>{
                  const pct = history.length?Math.round((item.count/history.length)*100):0;
                  return <div key={item.label} style={{ flex:1, background:`${item.color}10`, border:`1px solid ${item.color}30`, borderRadius:12, padding:"12px 8px", textAlign:"center" }}>
                    <div style={{ ...orb, fontSize:20, color:item.color, lineHeight:1, marginBottom:4 }}>{item.count}</div>
                    <div style={{ ...orb, fontSize:8, color:T.textDim }}>{item.label}</div>
                    <div style={{ ...orb, fontSize:10, color:item.color, marginTop:4 }}>%{pct}</div>
                  </div>;
                })}
              </div>
            </div>
          )}

          {/* 30-day heatmap */}
          {history.length>0 && (
            <div style={{ background:T.surface, border:`1px solid ${T.border}`, borderRadius:16, padding:16, marginBottom:14 }}>
              <div style={{ ...orb, fontSize:9, color:T.textDim, letterSpacing:2, marginBottom:12 }}>30 GÜNLÜK ODAK HARİTASI</div>
              <div style={{ display:"grid", gridTemplateColumns:"repeat(10,1fr)", gap:4 }}>
                {Array.from({length:30},(_,i)=>{
                  const d=new Date(); d.setDate(d.getDate()-29+i);
                  const key=d.toDateString();
                  const mins=history.filter(h=>h.date===key).reduce((s,h)=>s+(h.min||0),0);
                  const intensity=mins>0?Math.min(1,mins/120):0;
                  const isToday=i===29;
                  return <div key={i} style={{ aspectRatio:"1", borderRadius:4, background:isToday?T.accent:mins>0?`rgba(0,229,255,${0.15+intensity*0.7})`:"rgba(255,255,255,0.05)", border:isToday?`1px solid ${T.accent}`:"none" }}/>;
                })}
              </div>
              <div style={{ display:"flex", justifyContent:"space-between", marginTop:8 }}>
                <span style={{ ...orb, fontSize:7, color:T.textDim }}>30 gün önce</span>
                <span style={{ ...orb, fontSize:7, color:T.accent }}>Bugün</span>
              </div>
            </div>
          )}

          {/* Hourly heatmap */}
          <div style={{ background:T.surface, border:`1px solid ${T.border}`, borderRadius:16, padding:16, marginBottom:14 }}>
            <div style={{ ...orb, fontSize:9, color:T.textDim, letterSpacing:2, marginBottom:12 }}>SAATLIK VERİMLİLİK HARİTASI</div>
            {hourlyData.some(v=>v>0) ? (
              <>
                <div style={{ display:"flex", alignItems:"flex-end", gap:2, height:60, marginBottom:6 }}>
                  {hourlyData.map((val,hour)=>{
                    const maxV=Math.max(...hourlyData,1);
                    const h=Math.max(2,(val/maxV)*54);
                    const isPeak=hour===peakHour&&val>0;
                    return <div key={hour} style={{ flex:1, height:h, borderRadius:"2px 2px 0 0", background:isPeak?"#00e5ff":val>0?`rgba(0,229,255,${0.12+(val/maxV)*0.55})`:"rgba(255,255,255,0.04)", boxShadow:isPeak?"0 0 10px rgba(0,229,255,0.7)":"none", transition:"height 0.6s ease" }}/>;
                  })}
                </div>
                <div style={{ display:"flex", justifyContent:"space-between" }}>
                  {[0,6,12,18,23].map(h=><span key={h} style={{ ...orb, fontSize:7, color:T.textDim }}>{h}:00</span>)}
                </div>
                <div style={{ marginTop:10, padding:"8px 12px", background:"rgba(0,229,255,0.08)", borderRadius:10, border:"1px solid rgba(0,229,255,0.2)", display:"flex", justifyContent:"space-between" }}>
                  <span style={{ fontSize:11, color:T.textMuted }}>⚡ En verimli saat</span>
                  <span style={{ color:"#00e5ff", ...orb, fontSize:11 }}>{peakHour}:00 · {peakLabel}</span>
                </div>
              </>
            ) : (
              <p style={{ fontSize:12, color:T.textDim, textAlign:"center", padding:"16px 0" }}>Seans tamamlandıkça harita oluşacak.</p>
            )}
          </div>

          {/* Focus depth rings */}
          <div style={{ background:T.surface, border:`1px solid ${T.border}`, borderRadius:16, padding:16, marginBottom:14 }}>
            <div style={{ ...orb, fontSize:9, color:T.textDim, letterSpacing:2, marginBottom:14 }}>ODAK DERİNLİĞİ DAĞILIMI</div>
            <div style={{ display:"flex", gap:16, alignItems:"center" }}>
              <div style={{ position:"relative", width:96, height:96, flexShrink:0 }}>
                <svg width={96} height={96} style={{ transform:"rotate(-90deg)" }}>
                  {focusRings.map((ring,i)=>{
                    const r=40-i*12; const circ=2*Math.PI*r;
                    return <g key={ring.label}>
                      <circle cx={48} cy={48} r={r} fill="none" stroke="rgba(255,255,255,0.05)" strokeWidth={9}/>
                      <circle cx={48} cy={48} r={r} fill="none" stroke={ring.color} strokeWidth={9} strokeLinecap="round"
                        strokeDasharray={circ} strokeDashoffset={circ*(1-ring.pct/100)}
                        style={{ filter:`drop-shadow(0 0 4px ${ring.color}80)` }}/>
                    </g>;
                  })}
                </svg>
                <div style={{ position:"absolute", inset:0, display:"flex", alignItems:"center", justifyContent:"center" }}>
                  <span style={{ ...orb, fontSize:11, color:T.textMuted }}>{history.length}s</span>
                </div>
              </div>
              <div style={{ flex:1 }}>
                {focusRings.map(ring=>(
                  <div key={ring.label} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
                    <div style={{ display:"flex", gap:8, alignItems:"center" }}>
                      <div style={{ width:8, height:8, borderRadius:"50%", background:ring.color, boxShadow:`0 0 6px ${ring.color}` }}/>
                      <div>
                        <div style={{ fontSize:10, color:T.textMuted }}>{ring.label}</div>
                        <div style={{ ...orb, fontSize:8, color:T.textDim }}>{ring.count} seans</div>
                      </div>
                    </div>
                    <span style={{ ...orb, fontSize:14, color:ring.color }}>{ring.pct}%</span>
                  </div>
                ))}
              </div>
            </div>
          </div>

          {/* Activity breakdown */}
          {Object.keys(activityStats).length>0 && (
            <div style={{ background:T.surface, border:`1px solid ${T.border}`, borderRadius:16, padding:16, marginBottom:14 }}>
              <div style={{ ...orb, fontSize:9, color:T.textDim, letterSpacing:2, marginBottom:14 }}>AKTİVİTE DAĞILIMI</div>
              {Object.entries(activityStats).sort((a,b)=>b[1].mins-a[1].mins).slice(0,5).map(([id,st])=>{
                const ACTS=[{id:"study",icon:"📚",label:"Ders",color:"#00e5ff"},{id:"work",icon:"💼",label:"İş",color:"#7c3aed"},{id:"reading",icon:"📖",label:"Okuma",color:"#f59e0b"},{id:"coding",icon:"💻",label:"Kod",color:"#00ff88"},{id:"writing",icon:"✍️",label:"Yazı",color:"#ec4899"},{id:"language",icon:"🌍",label:"Dil",color:"#38bdf8"},{id:"research",icon:"🔬",label:"Araştırma",color:"#ff6b35"},{id:"creative",icon:"🎨",label:"Yaratıcı",color:"#a78bfa"},{id:"exercise",icon:"🏃",label:"Egzersiz",color:"#22c55e"},{id:"planning",icon:"🗓️",label:"Planlama",color:"#ffd700"},{id:"other",icon:"⚡",label:"Diğer",color:"#94a3b8"}];
                const a=ACTS.find(x=>x.id===id)||ACTS[ACTS.length-1];
                const maxM=Math.max(...Object.values(activityStats).map(x=>x.mins),1);
                return (
                  <div key={id} style={{ marginBottom:12 }}>
                    <div style={{ display:"flex", justifyContent:"space-between", marginBottom:5 }}>
                      <div style={{ display:"flex", gap:8, alignItems:"center" }}>
                        <span style={{ fontSize:16 }}>{a.icon}</span>
                        <div>
                          <div style={{ fontSize:11, color:T.text }}>{a.label}</div>
                          <div style={{ ...orb, fontSize:8, color:T.textDim }}>{st.count} seans · {st.mins}dk</div>
                        </div>
                      </div>
                      <span style={{ ...orb, fontSize:12, color:a.color }}>{Math.round((st.mins/Math.max(totalFocus,1))*100)}%</span>
                    </div>
                    <div style={{ background:"rgba(255,255,255,0.05)", borderRadius:5, height:5, overflow:"hidden" }}>
                      <div style={{ height:"100%", width:`${(st.mins/maxM)*100}%`, background:a.color, borderRadius:5, transition:"width 0.8s ease" }}/>
                    </div>
                  </div>
                );
              })}
            </div>
          )}

          {/* Distractors */}
          <div style={{ background:T.surface, border:`1px solid ${T.border}`, borderRadius:16, padding:16 }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
              <div style={{ ...orb, fontSize:9, color:T.textDim, letterSpacing:2 }}>DİKKAT DAĞITICILARI</div>
              <span style={{ ...orb, fontSize:9, color:"#ff6b35" }}>toplam: {totalDist}</span>
            </div>
            {totalDist===0 ? (
              <p style={{ fontSize:11, color:T.textDim, textAlign:"center", padding:"12px 0" }}>⚠️ butonu ile kaydet.</p>
            ) : distItems.map(item=>{
              const val=distractors[item.key]||0;
              if(!val) return null;
              return (
                <div key={item.key} style={{ marginBottom:10 }}>
                  <div style={{ display:"flex", justifyContent:"space-between", marginBottom:4 }}>
                    <span style={{ fontSize:12 }}>{item.icon} <span style={{ color:T.textMuted, fontSize:11 }}>{item.label}</span></span>
                    <span style={{ ...orb, fontSize:10, color:item.color }}>×{val}</span>
                  </div>
                  <div style={{ background:"rgba(255,255,255,0.05)", borderRadius:6, height:6, overflow:"hidden" }}>
                    <div style={{ height:"100%", width:`${(val/maxDist)*100}%`, background:item.color, borderRadius:6, transition:"width 0.8s ease" }}/>
                  </div>
                </div>
              );
            })}
          </div>
        </>
      )}

      {tab==="trends" && (
        <>
          {/* SVG Line Chart */}
          <div style={{ background:T.surface, border:`1px solid ${T.border}`, borderRadius:16, padding:16, marginBottom:14 }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14 }}>
              <div style={{ ...orb, fontSize:9, color:T.textDim, letterSpacing:2 }}>14 GÜNLÜK ODAK TRENDİ</div>
              <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                <span style={{ ...orb, fontSize:10, color:weekTrend>=0?"#00ff88":"#ff6b35" }}>{weekTrend>=0?"↑":"↓"}{Math.abs(weekTrend)}%</span>
                <span style={{ ...orb, fontSize:8, color:T.textDim }}>geçen hafta</span>
              </div>
            </div>
            {trendPath ? (
              <div>
                <svg width="100%" height={90} viewBox="0 0 340 90" style={{ overflow:"visible" }}>
                  <defs>
                    <linearGradient id="trendFill" x1="0" y1="0" x2="0" y2="1">
                      <stop offset="0%" stopColor={T.accent} stopOpacity="0.3"/>
                      <stop offset="100%" stopColor={T.accent} stopOpacity="0.02"/>
                    </linearGradient>
                  </defs>
                  <path d={trendPath.fill} fill="url(#trendFill)"/>
                  <path d={trendPath.path} fill="none" stroke={T.accent} strokeWidth={2} strokeLinecap="round" style={{ filter:`drop-shadow(0 0 4px ${T.accent})` }}/>
                  {trendPath.pts.map((p,i)=>{
                    const d=last14[i];
                    if(!d.mins) return null;
                    return <circle key={i} cx={p[0]} cy={p[1]} r={d.isToday?5:3} fill={d.isToday?T.accent:"rgba(0,229,255,0.6)"} stroke={d.isToday?"white":"none"} strokeWidth={1.5}/>;
                  })}
                </svg>
                <div style={{ display:"flex", justifyContent:"space-between", marginTop:4 }}>
                  {last14.filter((_,i)=>i%2===0).map((d,i)=>(
                    <span key={i} style={{ ...orb, fontSize:7, color:d.isToday?T.accent:T.textDim }}>{d.day}</span>
                  ))}
                </div>
              </div>
            ) : (
              <p style={{ fontSize:12, color:T.textDim, textAlign:"center", padding:"20px 0" }}>Grafik için seans tamamla.</p>
            )}
          </div>

          {/* Bar chart */}
          <div style={{ background:T.surface, border:`1px solid ${T.border}`, borderRadius:16, padding:16, marginBottom:14 }}>
            <div style={{ ...orb, fontSize:9, color:T.textDim, letterSpacing:2, marginBottom:14 }}>7 GÜNLÜK DAKİKA DAĞILIMI</div>
            <div style={{ display:"flex", alignItems:"flex-end", gap:6, height:100, marginBottom:8 }}>
              {last7.map((d,i)=>{
                const maxV=Math.max(...last7.map(x=>x.mins),1);
                const h=d.mins>0?Math.max(4,(d.mins/maxV)*90):4;
                return (
                  <div key={i} style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", gap:4 }}>
                    {d.mins>0&&<span style={{ ...orb, fontSize:7, color:d.isToday?T.accent:T.textDim }}>{d.mins}</span>}
                    <div style={{ width:"100%", height:h, borderRadius:"4px 4px 0 0", background:d.isToday?`linear-gradient(to top,${T.accent},${T.accent}88)`:d.mins>0?"rgba(0,229,255,0.3)":"rgba(255,255,255,0.04)", boxShadow:d.isToday?`0 0 12px ${T.accent}50`:"none", transition:"height 0.6s ease" }}/>
                  </div>
                );
              })}

            ))}

            <div style={{ fontSize:11, color:T.textMuted, marginBottom:18 }}>{report.period}</div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:16 }}>
              {report.stats.map(s=>(

                  <div style={{ fontSize:22, marginBottom:4 }}>{s.icon}</div>

          </div>
          <div style={{ background:T.surface, border:`1px solid ${T.border}`, borderRadius:16, padding:16 }}>

              <p style={{ fontSize:12, color:T.textDim, textAlign:"center", padding:"12px 0" }}>Henüz seans yok.</p>

              const ACTS=[{id:"study",icon:"📚",label:"Ders",color:"#00e5ff"},{id:"work",icon:"💼",label:"İş",color:"#7c3aed"},{id:"reading",icon:"📖",label:"Okuma",color:"#f59e0b"},{id:"coding",icon:"💻",label:"Kod",color:"#00ff88"},{id:"writing",icon:"✍️",label:"Yazı",color:"#ec4899"},{id:"language",icon:"🌍",label:"Dil",color:"#38bdf8"},{id:"research",icon:"🔬",label:"Araştırma",color:"#ff6b35"},{id:"creative",icon:"🎨",label:"Yaratıcı",color:"#a78bfa"},{id:"exercise",icon:"🏃",label:"Egzersiz",color:"#22c55e"},{id:"planning",icon:"🗓️",label:"Planlama",color:"#ffd700"},{id:"other",icon:"⚡",label:"Diğer",color:"#94a3b8"}];

                  <div style={{ display:"flex", gap:9, alignItems:"center" }}>
                    <div style={{ width:32, height:32, borderRadius:9, background:`${a.color}18`, border:`1px solid ${a.color}30`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:14 }}>{a.icon}</div>
                    <div>
                      <div style={{ ...orb, fontSize:11, color:T.text }}>{h.min}dk · {a.label}</div>

                    </div>
                  </div>

                    <div style={{ ...orb, fontSize:9, color:T.textMuted }}>{h.at}</div>
                    <div style={{ ...orb, fontSize:8, color:h.min>=45?"#00ff88":h.min>=25?"#00e5ff":"#a78bfa" }}>{h.min>=45?"DERİN":h.min>=25?"ORTA":"KISA"}</div>
                    {h.pts&&<div style={{ ...orb, fontSize:8, color:"#ffd700" }}>+{h.pts}⚡</div>}
                  </div>
                </div>
              );
            })}
          </div>
        </>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════
   QUESTS SCREEN
   ═══════════════════════════════════════════════════════════════ */
function QuestsScreen() {
  const { T, addPoints, addXP, todayKey, sessions, streak, xp, level } = useApp();
  const [history]       = useLS("fb_history", []);
  const [habits]        = useLS("fb_habits_v3", []);
  const [checked]       = useLS("fb_checked_" + todayKey, []);
  const [claimedQuests, setClaimedQuests] = useLS("fb_claimed_quests", {});
  const [playedGames]   = useLS("fb_playedGames3", {});
  const [activityStats] = useLS("fb_activity_stats", {});
  const [tab, setTab]   = useState("daily");

  const todaySessions  = history.filter(h => h.date === todayKey).length;
  const todayMins      = history.filter(h => h.date === todayKey).reduce((s,h) => s+(h.min||0), 0);
  const todayHabits    = checked.length;
  const totalMins      = history.reduce((s,h) => s+(h.min||0), 0);
  const gamesPlayed    = Object.keys(playedGames).filter(k => k.includes(todayKey)).length;
  const uniqueActCount = Object.keys(activityStats).length;
  const deepSessions   = history.filter(h => (h.min||0) >= 45).length;
  const diffHard       = history.filter(h => h.difficulty === 3).length;
  const weekKey        = "wk_" + new Date().getFullYear() + "_" + String(Math.ceil(new Date().getDate()/7));
  const weekMins       = (() => { const d=new Date(); return history.filter(h=>{const hd=new Date(h.date);return (d-hd)<7*864e5;}).reduce((s,h)=>s+(h.min||0),0); })();

  const DAILY = [
    {id:"d_1s",   title:"İlk Ateşleme",      desc:"Bugün 1 odak seansı tamamla",              icon:"🚀",color:"#00e5ff",reward:15, xpR:8,  prog:Math.min(1,todaySessions),goal:1},
    {id:"d_3s",   title:"Üçlü Kombo",         desc:"Bugün 3 seans tamamla",                    icon:"🔥",color:"#ff6b35",reward:40, xpR:22, prog:Math.min(3,todaySessions),goal:3},
    {id:"d_90m",  title:"Saat Bucağı",        desc:"Bugün toplam 90 dakika odaklan",            icon:"⏱️",color:"#a78bfa",reward:55, xpR:30, prog:Math.min(90,todayMins),goal:90},
    {id:"d_allh", title:"Mükemmel Gün",       desc:"Tüm alışkanlıklarını tamamla",              icon:"✅",color:"#00ff88",reward:35, xpR:20, prog:todayHabits,goal:Math.max(1,habits.length)},
    {id:"d_game", title:"Zihin Ritüeli",      desc:"Günlük zihin oyununu oyna",                 icon:"🧠",color:"#7c3aed",reward:25, xpR:14, prog:Math.min(1,gamesPlayed),goal:1},
    {id:"d_hard", title:"Zorluk Arayışı",     desc:"ZOR seviyede 1 seans tamamla",              icon:"⚔️",color:"#ff6b35",reward:50, xpR:28, prog:Math.min(1,diffHard),goal:1},
    {id:"d_deep", title:"Derin Dalış",        desc:"45+ dakika 1 seans tamamla",                icon:"🔬",color:"#ffd700",reward:60, xpR:35, prog:Math.min(1,history.filter(h=>h.date===todayKey&&(h.min||0)>=45).length),goal:1},
    {id:"d_5h",   title:"5'lik Rutin",        desc:"Bugün 5 alışkanlık tamamla",                icon:"🧘",color:"#22c55e",reward:30, xpR:16, prog:Math.min(5,todayHabits),goal:5},
  ];

  const WEEKLY = [
    {id:weekKey+"_s5",   title:"Haftalık Motor",     desc:"Bu hafta 5 seans tamamla",           icon:"🏃",color:"#00e5ff",reward:70, xpR:40, prog:Math.min(5,sessions%7),goal:5},
    {id:weekKey+"_300m", title:"5 Saatlik Zihin",    desc:"Bu hafta 300 dakika odaklan",         icon:"⚡",color:"#ff6b35",reward:110,xpR:65, prog:Math.min(300,weekMins),goal:300},
    {id:weekKey+"_str7", title:"Yedi Günlük Zincir", desc:"7 gün streak oluştur",                icon:"🔗",color:"#ffd700",reward:120,xpR:70, prog:Math.min(7,streak),goal:7},
    {id:weekKey+"_2act", title:"Çok Yönlü",          desc:"2 farklı aktivite türü çalış",        icon:"🎭",color:"#a78bfa",reward:60, xpR:35, prog:Math.min(2,uniqueActCount),goal:2},
    {id:weekKey+"_3deep",title:"Derin Odak Ustası",  desc:"3 adet 45+ dk seans tamamla",         icon:"🏔️",color:"#00ff88",reward:100,xpR:58, prog:Math.min(3,deepSessions),goal:3},
    {id:weekKey+"_allg", title:"Oyun Koleksiyoncusu",desc:"Bu haftaki 7 zihin oyununu oyna",     icon:"🎮",color:"#ec4899",reward:90, xpR:50, prog:Math.min(7,new Set(Object.keys(playedGames).map(k=>k.split("_")[0])).size),goal:7},
    {id:weekKey+"_xp",   title:"XP Avcısı",          desc:"Bu seviyede 80 XP biriktir",          icon:"⭐",color:"#7c3aed",reward:80, xpR:45, prog:Math.min(80,xp%100),goal:80},
  ];

  const SPECIAL = [
    {id:"sp_lv5",   title:"Yükseliş",          desc:"Seviye 5'e ulaş",               icon:"🌟",color:"#ffd700",reward:200, xpR:100,prog:Math.min(5,level),goal:5},
    {id:"sp_lv10",  title:"Usta Protokolü",    desc:"Seviye 10'a ulaş",              icon:"💎",color:"#00e5ff",reward:400, xpR:200,prog:Math.min(10,level),goal:10},
    {id:"sp_lv20",  title:"Efsane Statüsü",    desc:"Seviye 20'ye ulaş",             icon:"👑",color:"#ff6b35",reward:1000,xpR:500,prog:Math.min(20,level),goal:20},
    {id:"sp_50s",   title:"50 Seans Efsanesi", desc:"50 odak seansı tamamla",        icon:"🏆",color:"#ffd700",reward:500, xpR:250,prog:Math.min(50,sessions),goal:50},
    {id:"sp_100s",  title:"Yüzler Kulübü",     desc:"100 odak seansı tamamla",       icon:"💯",color:"#ff6b35",reward:1500,xpR:750,prog:Math.min(100,sessions),goal:100},
    {id:"sp_str14", title:"İki Haftalık Dev",   desc:"14 gün streak oluştur",         icon:"🗿",color:"#e2e8f0",reward:300, xpR:150,prog:Math.min(14,streak),goal:14},
    {id:"sp_str30", title:"Aylık Demir",        desc:"30 gün streak oluştur",         icon:"⚙️",color:"#94a3b8",reward:800, xpR:400,prog:Math.min(30,streak),goal:30},
    {id:"sp_1000m", title:"Zaman Efendisi",     desc:"1000 dakika odaklan",           icon:"⌛",color:"#a78bfa",reward:400, xpR:200,prog:Math.min(1000,totalMins),goal:1000},
    {id:"sp_3000m", title:"Zaman Ötesi",        desc:"3000 dakika odaklan",           icon:"🌌",color:"#7c3aed",reward:1200,xpR:600,prog:Math.min(3000,totalMins),goal:3000},
    {id:"sp_50deep",title:"Derin Araştırmacı",  desc:"50 adet derin seans (45+ dk)",  icon:"🔭",color:"#00ff88",reward:600, xpR:300,prog:Math.min(50,deepSessions),goal:50},
    {id:"sp_5act",  title:"Beyin Mimarı",       desc:"5 farklı aktivite türünde çalış",icon:"🧬",color:"#ec4899",reward:350,xpR:175,prog:Math.min(5,uniqueActCount),goal:5},
  ];

  const QUESTS_MAP = { daily:DAILY, weekly:WEEKLY, special:SPECIAL };
  const quests = QUESTS_MAP[tab] || DAILY;
  const claimedCount   = quests.filter(q => claimedQuests[q.id]).length;
  const completedCount = quests.filter(q => q.prog >= q.goal && !claimedQuests[q.id]).length;
  const tabColors = { daily:"#00e5ff", weekly:"#ffd700", special:"#ff6b35" };
  const tc = tabColors[tab];

  function claim(quest) {
    if (claimedQuests[quest.id] || quest.prog < quest.goal) return;
    setClaimedQuests(p => ({...p, [quest.id]:true}));
    addPoints(quest.reward); addXP(quest.xpR);
  }

  return (
    <div style={{ padding:"16px 16px 100px" }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14 }}>
        <div>
          <h2 style={{ ...orb, fontSize:14, color:T.textMuted, letterSpacing:3 }}>GÖREV MERKEZİ</h2>
          <p style={{ ...orb, fontSize:9, color:T.textDim, marginTop:3 }}>
            {claimedCount}/{quests.length} tamamlandı
            {completedCount>0&&<span style={{ color:"#ffd700" }}> · {completedCount} TALEP BEKLİYOR!</span>}
          </p>
        </div>
        {completedCount>0&&(
          <div style={{ background:"linear-gradient(135deg,#ffd700,#ff6b35)", borderRadius:20, padding:"5px 14px", ...orb, fontSize:10, color:"#050a14", fontWeight:700 }}>
            {completedCount} HAZIR!
          </div>
        )}
      </div>

      <div style={{ display:"flex", gap:6, marginBottom:16 }}>
        {[["daily","📅 Günlük"],["weekly","📆 Haftalık"],["special","🏆 Özel"]].map(([id,label])=>(
          <button key={id} onClick={()=>setTab(id)} style={{ flex:1, padding:"10px 0", borderRadius:12, cursor:"pointer", background:tab===id?`linear-gradient(135deg,${tabColors[id]},${tabColors[id]}99)`:"rgba(255,255,255,0.04)", border:tab===id?"none":`1px solid ${T.border}`, color:tab===id?"#050a14":T.textMuted, ...orb, fontSize:10, letterSpacing:1, fontWeight:700 }}>{label}</button>
        ))}
      </div>

      <div style={{ background:`${tc}08`, border:`1px solid ${tc}25`, borderRadius:14, padding:"12px 16px", marginBottom:16, display:"flex", alignItems:"center", justifyContent:"space-between" }}>
        <div style={{ display:"flex", alignItems:"center", gap:10 }}>
          <div style={{ background:`${tc}20`, border:`1px solid ${tc}40`, borderRadius:10, width:36, height:36, display:"flex", alignItems:"center", justifyContent:"center" }}>
            <span style={{ ...orb, fontSize:13, color:tc }}>{claimedCount}</span>
          </div>
          <div>
            <div style={{ ...orb, fontSize:10, color:T.text }}>Tamamlanan</div>
            <div style={{ ...orb, fontSize:8, color:T.textDim, marginTop:2 }}>{quests.length} görevden</div>
          </div>
        </div>
        <div style={{ height:32, width:1, background:T.border }}/>
        <div style={{ textAlign:"right" }}>
          <div style={{ ...orb, fontSize:10, color:tc }}>{quests.filter(q=>!claimedQuests[q.id]).reduce((s,q)=>s+q.reward,0)}⚡</div>
          <div style={{ ...orb, fontSize:8, color:T.textDim, marginTop:2 }}>kalan ödül</div>
        </div>
      </div>

      {quests.map(quest => {
        const pct     = Math.min(100, (quest.prog/quest.goal)*100);
        const done    = quest.prog >= quest.goal;
        const claimed = claimedQuests[quest.id];
        return (
          <div key={quest.id} style={{ background:claimed?"rgba(0,255,136,0.05)":done?`${quest.color}0d`:T.surface, border:claimed?"1px solid rgba(0,255,136,0.25)":done?`1px solid ${quest.color}45`:`1px solid ${T.border}`, borderRadius:16, padding:16, marginBottom:10, opacity:claimed?0.6:1, transition:"all 0.25s" }}>
            <div style={{ display:"flex", gap:12, alignItems:"flex-start" }}>
              <div style={{ width:46, height:46, borderRadius:14, background:`${quest.color}18`, border:`1px solid ${quest.color}40`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:22, flexShrink:0, boxShadow:done&&!claimed?`0 0 14px ${quest.color}40`:"none" }}>
                {claimed?"✓":quest.icon}
              </div>
              <div style={{ flex:1 }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:4 }}>
                  <div style={{ ...orb, fontSize:12, color:claimed?"#00ff88":done?quest.color:T.text }}>{quest.title}</div>
                  <div style={{ display:"flex", gap:5 }}>
                    <span style={{ ...orb, fontSize:9, color:quest.color }}>+{quest.reward}⚡</span>
                    <span style={{ ...orb, fontSize:9, color:"#a78bfa" }}>+{quest.xpR}XP</span>
                  </div>
                </div>
                <div style={{ fontSize:11, color:T.textMuted, marginBottom:10, lineHeight:1.4 }}>{quest.desc}</div>
                <div style={{ background:"rgba(255,255,255,0.05)", borderRadius:6, height:5, overflow:"hidden", marginBottom:6 }}>
                  <div style={{ height:"100%", width:`${pct}%`, background:claimed?"#00ff88":`linear-gradient(90deg,${quest.color},${quest.color}88)`, borderRadius:6, transition:"width 0.6s ease", boxShadow:done&&!claimed?`0 0 10px ${quest.color}60`:"none" }}/>
                </div>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                  <span style={{ ...orb, fontSize:9, color:T.textDim }}>{quest.prog}/{quest.goal}</span>
                  {done&&!claimed ? (
                    <button onClick={()=>claim(quest)} style={{ background:`linear-gradient(135deg,${quest.color},${quest.color}99)`, border:"none", borderRadius:8, padding:"6px 16px", ...orb, fontSize:9, color:"#050a14", fontWeight:700, cursor:"pointer", letterSpacing:1, boxShadow:`0 0 16px ${quest.color}50` }}>TALEP ET</button>
                  ) : claimed ? (
                    <span style={{ ...orb, fontSize:9, color:"#00ff88" }}>✓ ALINDI</span>
                  ) : (
                    <span style={{ ...orb, fontSize:9, color:T.textDim }}>{Math.round(pct)}%</span>
                  )}
                </div>
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );
}


function NavBar({ screen, setScreen, points }) {
  const { T, t, theme } = useApp();
  const tabs = [
    { id:"home",      icon:"🏠", label:"Ana" },
    { id:"focus",     icon:"⏱️", label:"Odak" },
    { id:"habits",    icon:"✅", label:"Rutin" },
    { id:"mind",      icon:"🧠", label:"Zihin" },
    { id:"quests",    icon:"🎯", label:"Görev" },
    { id:"analytics", icon:"📊", label:"Analiz" },
    { id:"base",      icon:"🏛️", label:"Üs" },
    { id:"settings",  icon:"⚙️", label:"Ayar" },
  ];
  return (
    <div style={{ position:"fixed", bottom:0, left:"50%", transform:"translateX(-50%)", width:"100%", maxWidth:430,
      background:T.navBg, borderTop:`1px solid ${T.border}`,
      display:"flex", justifyContent:"space-around", alignItems:"center",
      padding:"8px 0 20px", zIndex:100, backdropFilter:"blur(24px)" }}>
      {tabs.map(tab => (
        <button key={tab.id} onClick={() => setScreen(tab.id)} style={{
          background:"none", border:"none", cursor:"pointer",
          display:"flex", flexDirection:"column", alignItems:"center", gap:3,
          color: screen === tab.id ? T.accent : T.textDim,
          transition:"all 0.2s", transform:screen === tab.id ? "scale(1.1)" : "scale(1)",
          padding:"0 4px",
        }}>
          <span style={{ fontSize:19 }}>{tab.icon}</span>
          <span style={{ ...orb, fontSize:7, letterSpacing:1 }}>{tab.label}</span>
          {screen === tab.id && <div style={{ width:3, height:3, borderRadius:"50%", background:T.accent, boxShadow:`0 0 8px ${T.accent}` }} />}
        </button>
      ))}
      <div style={{ position:"absolute", top:-16, right:10, background:`linear-gradient(135deg,${T.accent},${T.accent}88)`, borderRadius:20, padding:"4px 12px", display:"flex", alignItems:"center", gap:5, boxShadow:`0 0 20px ${T.accent}50` }}>
        <span style={{ fontSize:12 }}>⚡</span>
        <span style={{ ...orb, fontSize:12, color:"#050a14", fontWeight:700 }}>{points}</span>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════
   ROOT
   ═══════════════════════════════════════════════════════════════ */
function App() {
  const [screen, setScreen] = useState("home");
  const [theme, setTheme] = useLS("fb_theme", "dark");
  const [settings, setSettings] = useLS("fb_settings", { lang:"tr", sound:true, vib:true, dailyRem:true, focusRem:false });
  const [points, setPoints] = useLS("fb_points", 0);
  const [xp, setXp] = useLS("fb_xp", 0);
  const [sessions] = useLS("fb_sessions", 0);
  const [streak] = useLS("fb_streak", 0);
  const [mood, setMood] = useLS("fb_mood", 2);
  const todayKey = new Date().toDateString();
  const lang = settings.lang || "tr";
  const t = LANG[lang];
  const T = theme === "dark" ? DARK : LIGHT;
  // Progressive XP: level 1=100xp, 2=180, 3=280, 4=400, 5=540...
  // cumulative: [0,100,280,560,960,1500,2180,3010,4000,5160,6500,8000]
  const XP_THRESHOLDS = [0,100,280,560,960,1500,2180,3010,4000,5160,6500,8000,10000];
  const level = XP_THRESHOLDS.reduce((lv, thresh, i) => xp >= thresh ? i : lv, 0);
  const levelXP = XP_THRESHOLDS[level] || 0;
  const nextXP  = XP_THRESHOLDS[level + 1] || XP_THRESHOLDS[XP_THRESHOLDS.length - 1];
  const levelProgress = Math.min(1, (xp - levelXP) / Math.max(1, nextXP - levelXP));
  const addPoints = useCallback((n) => setPoints(p => p + n), [setPoints]);
  const addXP = useCallback((n) => setXp(p => p + n), [setXp]);

  // Shared placed state — BaseScreen reads/writes, all screens read effects
  const [placedGlobal, setPlacedGlobal] = useLS("fb_placed_v3", [{ id:"hq_0", structId:"hq", col:2, row:3 }]);
  const baseEffects = calcBaseEffects(placedGlobal);

  const ctx = { T, t, lang, theme, setTheme, settings, setSettings, points, setPoints, addPoints, xp, setXp, addXP, level, levelProgress, levelXP, nextXP, XP_THRESHOLDS, sessions, streak, mood, setMood, todayKey, placedGlobal, setPlacedGlobal, baseEffects };

  return (
    <AppCtx.Provider value={ctx}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=JetBrains+Mono:wght@300;400;500&display=swap');
        *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
        body { background:${T.bg}; color:${T.text}; font-family:'JetBrains Mono',monospace; min-height:100dvh; transition:background 0.3s,color 0.3s; }
        input, button { font-family:'JetBrains Mono',monospace; }
        @keyframes slideUp   { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
        @keyframes slideDown { from{opacity:0;transform:translateY(-18px)} to{opacity:1;transform:translateY(0)} }
        @keyframes fadeIn    { from{opacity:0} to{opacity:1} }
        ::-webkit-scrollbar { width:0; }
        input[type=number]::-webkit-inner-spin-button { -webkit-appearance:none; }
      `}</style>

      {/* Ambient background */}
      <div style={{ position:"fixed", inset:0, zIndex:0, pointerEvents:"none",
        background: theme === "dark"
          ? "radial-gradient(ellipse at 15% 15%,rgba(0,112,255,0.07),transparent 55%),radial-gradient(ellipse at 85% 85%,rgba(0,229,255,0.04),transparent 55%)"
          : "radial-gradient(ellipse at 20% 20%,rgba(0,100,220,0.05),transparent 55%)"
      }} />
      {theme === "dark" && (
        <div style={{ position:"fixed", inset:0, zIndex:0, overflow:"hidden", pointerEvents:"none" }}>
          {Array.from({length:50}).map((_, i) => (
            <div key={i} style={{ position:"absolute", width:Math.random()*2+0.5, height:Math.random()*2+0.5, borderRadius:"50%", background:"white", opacity:Math.random()*0.28+0.05, left:`${Math.random()*100}%`, top:`${Math.random()*100}%` }} />
          ))}
        </div>
      )}

      <div style={{ position:"relative", zIndex:1, maxWidth:430, margin:"0 auto", minHeight:"100dvh", overflowY:"auto" }}>
        {/* Status bar */}
        <div style={{ padding:"14px 18px 8px", display:"flex", justifyContent:"space-between", alignItems:"center", borderBottom:`1px solid ${T.border}` }}>
          <span style={{ ...orb, fontSize:10, color:T.textDim, letterSpacing:3 }}>FOCUS BASE</span>
          <span style={{ ...orb, fontSize:10, color:T.textDim, letterSpacing:1 }}>
            {new Date().toLocaleTimeString(lang === "tr" ? "tr-TR" : "en-US", { hour:"2-digit", minute:"2-digit" })}
          </span>
        </div>

        {screen === "home"      && <HomeScreen setScreen={setScreen} />}
        {screen === "base"      && <BaseScreen />}
        {screen === "focus"     && <FocusScreen />}
        {screen === "habits"    && <HabitsScreen />}
        {screen === "mind"      && <MindScreen />}
        {screen === "analytics" && <AnalyticsScreen />}
        {screen === "quests"    && <QuestsScreen />}
        {screen === "settings"  && <SettingsScreen />}

        <NavBar screen={screen} setScreen={setScreen} points={points} />
      </div>
    </AppCtx.Provider>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
